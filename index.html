<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Innovative Centre Test System - Entry</title>
    <link rel="stylesheet" href="assets/css/entry.css">
    <link rel="icon" href="assets/icons/innovativecentre.png">
</head>
<body>
    <!-- Load distraction-free mode first -->
    <script src="assets/js/distraction-free.js"></script>
    
    <div class="main-container">
        <!-- Left Side - Background Image -->
        <div class="left-panel">
            <div class="background-image"></div>
        </div>
        
        <!-- Right Side - Login Form -->
        <div class="right-panel">
            <div class="header-section">
                <img src="assets/icons/Logo Big.png" alt="Innovative Centre" class="logo">
                <a href="#" onclick="showInvigilatorLogin(); return false;" class="admin-link">Go to Admin Login →</a>
            </div>
            
            <div class="login-container">
                <h1 class="welcome-title">Welcome to Candidate login!</h1>
                
                <div class="entry-form">
                    <div class="form-group">
                        <input type="text" id="studentId" placeholder="Enter your student ID" required maxlength="4" pattern="[0-9]{1,4}" inputmode="numeric">
                        <small id="studentIdError" style="color: #d32f2f; display: none; font-size: 0.875rem; margin-top: 4px;">Student ID must be numbers only (max 4 digits)</small>
                    </div>
                    
                    <div class="form-group">
                        <input type="text" id="studentName" placeholder="Full Name" required pattern="[A-Za-z]+\s+[A-Za-z]+.*" maxlength="50">
                        <small id="studentNameError" style="color: #d32f2f; display: none; font-size: 0.875rem; margin-top: 4px;">Please enter at least first name and surname (letters only, max 50 characters)</small>
                    </div>
                    
                    <button id="startTest" class="login-button">Login</button>
                </div>
                
                <p class="footer-text">Trouble logging in? Contact your invigilator.</p>
            </div>
        </div>
    </div>

    <script>
        // Real-time validation for Student ID (numbers only, max 4 digits)
        document.getElementById('studentId').addEventListener('input', function(e) {
            let value = e.target.value;
            // Remove any non-numeric characters
            value = value.replace(/[^0-9]/g, '');
            // Limit to 4 digits
            if (value.length > 4) {
                value = value.substring(0, 4);
            }
            e.target.value = value;
            
            // Show/hide error message
            const errorMsg = document.getElementById('studentIdError');
            if (value.length > 0 && !/^[0-9]{1,4}$/.test(value)) {
                errorMsg.style.display = 'block';
            } else {
                errorMsg.style.display = 'none';
            }
        });

        // Real-time validation for Student Name (letters, spaces, hyphens only)
        document.getElementById('studentName').addEventListener('input', function(e) {
            let value = e.target.value;
            // Allow only letters, spaces, hyphens, and apostrophes
            value = value.replace(/[^A-Za-z\s\-']/g, '');
            // Limit to 50 characters
            if (value.length > 50) {
                value = value.substring(0, 50);
            }
            e.target.value = value;
            
            // Show/hide error message
            const errorMsg = document.getElementById('studentNameError');
            const words = value.trim().split(/\s+/);
            if (value.length > 0 && words.length < 2) {
                errorMsg.style.display = 'block';
            } else {
                errorMsg.style.display = 'none';
            }
        });

        document.getElementById('startTest').addEventListener('click', function() {
            const studentId = document.getElementById('studentId').value.trim();
            const studentName = document.getElementById('studentName').value.trim();
            
            // Validate Student ID (must be 1-4 digits)
            if (!studentId) {
                alert('Please enter your Student ID');
                return;
            }
            
            if (!/^[0-9]{1,4}$/.test(studentId)) {
                alert('Student ID must be numbers only (maximum 4 digits)');
                document.getElementById('studentIdError').style.display = 'block';
                return;
            }
            
            // Validate Student Name (must have at least first name and surname)
            if (!studentName) {
                alert('Please enter your Full Name');
                return;
            }
            
            const nameParts = studentName.trim().split(/\s+/);
            if (nameParts.length < 2) {
                alert('Please enter at least your first name and surname');
                document.getElementById('studentNameError').style.display = 'block';
                return;
            }
            
            if (!/^[A-Za-z\s\-']+$/.test(studentName)) {
                alert('Name must contain only letters, spaces, hyphens, and apostrophes');
                document.getElementById('studentNameError').style.display = 'block';
                return;
            }
            
            // Save student info to localStorage
            localStorage.setItem('studentId', studentId);
            localStorage.setItem('studentName', studentName);
            localStorage.setItem('examType', 'IELTS');
            localStorage.setItem('testStartTime', new Date().toISOString());
            
            // Redirect to dashboard
            window.location.href = 'dashboard.html';
        });
        
        // Enter key support
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('startTest').click();
            }
        });

        // Invigilator Access Functions
        function showInvigilatorLogin() {
            const modal = document.getElementById('invigilator-modal');
            modal.classList.remove('hidden');
            modal.style.display = 'flex';
            modal.style.alignItems = 'center';
            modal.style.justifyContent = 'center';
            document.getElementById('invigilator-password').focus();
        }

        function closeInvigilatorModal() {
            const modal = document.getElementById('invigilator-modal');
            modal.classList.add('hidden');
            modal.style.display = 'none';
            document.getElementById('invigilator-password').value = '';
            document.getElementById('password-error').style.display = 'none';
        }

        function verifyInvigilatorPassword() {
            const password = document.getElementById('invigilator-password').value;
            const correctPassword = 'InV!#2025$SecurePass'; // Strong password - change this for production
            
            if (password === correctPassword) {
                // Correct password - redirect to invigilator page
                window.location.href = 'invigilator.html';
            } else {
                // Wrong password
                document.getElementById('password-error').style.display = 'block';
                document.getElementById('invigilator-password').value = '';
                document.getElementById('invigilator-password').focus();
            }
        }

        // Allow Enter key to submit password in invigilator modal
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && document.getElementById('invigilator-modal') && !document.getElementById('invigilator-modal').classList.contains('hidden')) {
                verifyInvigilatorPassword();
            }
        });
    </script>

    <!-- Invigilator Access Modal -->
    <div id="invigilator-modal" class="modal-overlay hidden" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000;">
        <div class="modal-content" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 0; border-radius: 8px; max-width: 400px; width: 90%;">
            <button class="modal-close-btn" onclick="closeInvigilatorModal()" style="position: absolute; top: 10px; right: 15px; background: none; border: none; font-size: 24px; cursor: pointer;">&times;</button>
            <h2 style="margin: 0; padding: 20px 20px 10px; font-size: 20px;">Invigilator Access</h2>
            <div style="padding: 20px;">
                <label for="invigilator-password" style="display: block; margin-bottom: 10px; font-weight: bold;">Enter Password:</label>
                <input type="password" id="invigilator-password" placeholder="Password" style="width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;">
                <button onclick="verifyInvigilatorPassword()" style="width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px;">Access Invigilator Page</button>
                <p id="password-error" style="color: red; margin-top: 10px; display: none;">Incorrect password. Please try again.</p>
            </div>
        </div>
    </div>

    <style>
        .modal-overlay.hidden {
            display: none !important;
        }
        
        .invigilator-access:hover {
            opacity: 1 !important;
        }
    </style>
</body>
</html>
