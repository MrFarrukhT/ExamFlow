<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS Test System - Entry</title>
    <link rel="stylesheet" href="assets/css/entry.css">
</head>
<body>
    <div class="container">
        <div class="ielts-header">
            <h1>IELTS Test System</h1>
            <p>Please enter your details to begin the test</p>
        </div>
        
        <div class="entry-form">
            <div class="form-group">
                <label for="studentId">Student ID</label>
                <input type="text" id="studentId" placeholder="Enter your student ID" required>
            </div>
            
            <div class="form-group">
                <label for="studentName">Full Name</label>
                <input type="text" id="studentName" placeholder="Enter your full name" required>
            </div>
            
            <button id="startTest" class="start-button">Start Test</button>
        </div>
        
        <div class="footer">
            <p>Make sure you have a stable internet connection</p>
        </div>
    </div>

    <script>
        document.getElementById('startTest').addEventListener('click', function() {
            const studentId = document.getElementById('studentId').value.trim();
            const studentName = document.getElementById('studentName').value.trim();
            
            if (!studentId || !studentName) {
                alert('Please enter both Student ID and Full Name');
                return;
            }
            
            // Save student info to localStorage
            localStorage.setItem('studentId', studentId);
            localStorage.setItem('studentName', studentName);
            localStorage.setItem('testStartTime', new Date().toISOString());
            
            // Redirect to dashboard
            window.location.href = 'dashboard.html';
        });
        
        // Enter key support
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('startTest').click();
            }
        });
    </script>
</body>
</html>
