<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Innovative Centre Test System - Entry</title>
    <link rel="stylesheet" href="assets/css/entry.css">
    <link rel="icon" href="assets/icons/innovativecentre.png">
</head>
<body>
    <!-- Load distraction-free mode first -->
    <script src="assets/js/distraction-free.js"></script>
    
    <main>
    <div class="main-container">
        <!-- Left Side - Background Image -->
        <div class="left-panel">
            <div class="background-image"></div>
        </div>

        <!-- Right Side - Login Form -->
        <div class="right-panel">
            <div class="header-section">
                <img src="assets/icons/Logo Big.png" alt="Innovative Centre" class="logo">
                <div class="exam-badge">IELTS</div>
                <a href="#" onclick="showInvigilatorLogin(); return false;" class="admin-link">Go to Invigilator Login →</a>
            </div>

            <div class="login-container" aria-label="Candidate login form">
                <h1 class="welcome-title">Welcome to Candidate login!</h1>
                <p class="exam-subtitle">IELTS Academic Assessment</p>

                <div class="entry-form">
                    <div class="form-group" id="idGroup">
                        <input type="text" id="studentId" placeholder="Student ID" required aria-required="true" aria-describedby="studentIdError" maxlength="4" pattern="[0-9]{1,4}" inputmode="numeric" autocomplete="off">
                        <label for="studentId">Student ID</label>
                        <small id="studentIdError" class="form-error" role="alert">Student ID must be numbers only (max 4 digits)</small>
                    </div>

                    <div class="form-group" id="nameGroup">
                        <input type="text" id="studentName" placeholder="Full Name" required aria-required="true" aria-describedby="studentNameError" pattern="[A-Za-z]+\s+[A-Za-z]+.*" maxlength="50" autocomplete="off">
                        <label for="studentName">Full Name</label>
                        <small id="studentNameError" class="form-error" role="alert">Please enter at least first name and surname</small>
                    </div>

                    <button id="startTest" class="login-button">Login</button>
                </div>

                <p class="footer-text">Trouble logging in? Contact your invigilator.</p>
            </div>
        </div>
    </div>
    </main>

    <script>
        function showError(groupId, errorId) {
            const group = document.getElementById(groupId);
            const error = document.getElementById(errorId);
            group.classList.add('error');
            error.classList.add('visible');
        }

        function clearError(groupId, errorId) {
            const group = document.getElementById(groupId);
            const error = document.getElementById(errorId);
            group.classList.remove('error');
            error.classList.remove('visible');
        }

        // Real-time validation for Student ID (numbers only, max 4 digits)
        document.getElementById('studentId').addEventListener('input', function(e) {
            let value = e.target.value.replace(/[^0-9]/g, '');
            if (value.length > 4) value = value.substring(0, 4);
            e.target.value = value;
            clearError('idGroup', 'studentIdError');
        });

        // Real-time validation for Student Name (letters, spaces, hyphens only)
        document.getElementById('studentName').addEventListener('input', function(e) {
            let value = e.target.value.replace(/[^A-Za-z\s\-']/g, '');
            if (value.length > 50) value = value.substring(0, 50);
            e.target.value = value;
            clearError('nameGroup', 'studentNameError');
        });

        document.getElementById('startTest').addEventListener('click', function() {
            const studentId = document.getElementById('studentId').value.trim();
            const studentName = document.getElementById('studentName').value.trim();
            let hasError = false;

            // Validate Student ID
            if (!studentId || !/^[0-9]{1,4}$/.test(studentId)) {
                showError('idGroup', 'studentIdError');
                document.getElementById('studentId').focus();
                hasError = true;
            }

            // Validate Student Name
            const nameParts = studentName.trim().split(/\s+/);
            if (!studentName || nameParts.length < 2 || !/^[A-Za-z\s\-']+$/.test(studentName)) {
                showError('nameGroup', 'studentNameError');
                if (!hasError) document.getElementById('studentName').focus();
                hasError = true;
            }

            if (hasError) return;

            // Show loading state
            const btn = this;
            btn.classList.add('loading');
            btn.textContent = 'Logging in...';

            // Save student info to localStorage
            localStorage.setItem('studentId', studentId);
            localStorage.setItem('studentName', studentName);
            localStorage.setItem('examType', 'IELTS');
            localStorage.setItem('testStartTime', new Date().toISOString());

            // Redirect to dashboard
            window.location.href = 'dashboard.html';
        });
        
        // Enter key support
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('startTest').click();
            }
        });

        // Invigilator Access Functions
        function showInvigilatorLogin() {
            const modal = document.getElementById('invigilator-modal');
            modal.classList.remove('hidden');
            modal.style.display = 'flex';
            modal.style.alignItems = 'center';
            modal.style.justifyContent = 'center';
            document.getElementById('invigilator-password').focus();
        }

        function closeInvigilatorModal() {
            const modal = document.getElementById('invigilator-modal');
            modal.classList.add('hidden');
            modal.style.display = 'none';
            document.getElementById('invigilator-password').value = '';
            document.getElementById('password-error').style.display = 'none';
        }

        function verifyInvigilatorPassword() {
            const password = document.getElementById('invigilator-password').value;
            const correctPassword = 'InV!#2025$SecurePass'; // Strong password - change this for production
            
            if (password === correctPassword) {
                // Correct password - redirect to invigilator page
                window.location.href = 'invigilator.html';
            } else {
                // Wrong password
                document.getElementById('password-error').style.display = 'block';
                document.getElementById('invigilator-password').value = '';
                document.getElementById('invigilator-password').focus();
            }
        }

        // Allow Enter key to submit password in invigilator modal
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && document.getElementById('invigilator-modal') && !document.getElementById('invigilator-modal').classList.contains('hidden')) {
                verifyInvigilatorPassword();
            }
        });
    </script>

    <!-- Invigilator Access Modal -->
    <div id="invigilator-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="invigilator-modal-title">
        <div class="modal-content">
            <button class="modal-close-btn" onclick="closeInvigilatorModal()" aria-label="Close invigilator login dialog">&times;</button>
            <h2 class="modal-title" id="invigilator-modal-title">Invigilator Access</h2>
            <div class="modal-body">
                <label for="invigilator-password">Enter Password:</label>
                <input type="password" id="invigilator-password" placeholder="Password" aria-required="true" aria-describedby="password-error">
                <button class="modal-submit-btn" onclick="verifyInvigilatorPassword()">Access Invigilator Page</button>
                <p id="password-error" class="modal-error" role="alert">Incorrect password. Please try again.</p>
            </div>
        </div>
    </div>
</body>
</html>
