<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Answers &amp; Results - IELTS</title>
    <link rel="stylesheet" href="assets/css/dashboard.css">
    <link rel="icon" href="assets/icons/innovativecentre.png">
    <style>
        .results-section {
            background: #ffffff;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 1.5rem;
            animation: fadeSlideUp 0.5s ease-out both;
        }
        .results-section:nth-child(2) { animation-delay: 0.1s; }
        .results-section:nth-child(3) { animation-delay: 0.2s; }
        .results-section:nth-child(4) { animation-delay: 0.3s; }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid #e8eaf6;
        }
        .section-header h2 {
            font-size: 1.35rem;
            font-weight: 600;
            color: #2c3e50;
            margin: 0;
        }
        .score-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1.25rem;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.95rem;
        }
        .score-badge.scored { background: #e8f5e9; color: #2e7d32; }
        .score-badge.pending { background: #fff3e0; color: #e65100; }
        .score-badge.not-submitted { background: #f5f5f5; color: #9e9e9e; }

        .answers-grid { display: grid; gap: 0.75rem; }
        .answer-row {
            display: grid;
            grid-template-columns: 50px 1fr 1fr 40px;
            align-items: center;
            padding: 0.75rem 1rem;
            border-radius: 6px;
            background: #fafafa;
            gap: 1rem;
            font-size: 0.95rem;
        }
        .answer-row.correct { background: #e8f5e9; }
        .answer-row.incorrect { background: #fce4ec; }
        .answer-row.no-key { background: #f5f5f5; }
        .answer-row .q-number { font-weight: 700; color: #1976d2; font-size: 0.9rem; }
        .answer-row .student-answer { font-weight: 500; color: #333; }
        .answer-row .correct-answer { color: #666; font-size: 0.9rem; }
        .answer-row .result-icon { font-size: 1.1rem; text-align: center; }
        .answer-row .result-icon.check { color: #2e7d32; }
        .answer-row .result-icon.cross { color: #c62828; }
        .answer-row .result-icon.dash { color: #bdbdbd; }

        .results-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .summary-card {
            background: #f8fbff;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 1.25rem;
            text-align: center;
        }
        .summary-card.highlight {
            border-color: #1976d2;
            background: #e3f2fd;
        }
        .summary-value {
            font-size: 1.75rem;
            font-weight: 700;
            color: #1976d2;
            margin-bottom: 0.25rem;
        }
        .summary-label {
            font-size: 0.8rem;
            color: #757575;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .answers-header {
            display: grid;
            grid-template-columns: 50px 1fr 1fr 40px;
            gap: 1rem;
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
            font-weight: 600;
            color: #757575;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .loading-state, .empty-state {
            text-align: center;
            padding: 3rem 2rem;
            color: #757575;
        }
        .loading-state .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e0e0e0;
            border-top-color: #1976d2;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .empty-state p { font-size: 1.1rem; margin-bottom: 0.5rem; }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: white;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            padding: 0.5rem 1rem;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 6px;
            transition: opacity 0.3s, background 0.3s;
        }
        .back-btn:hover { background: rgba(255,255,255,0.1); }

        .error-banner {
            background: #fce4ec;
            color: #c62828;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
        }
        .error-banner a { color: #c62828; font-weight: 600; }

        .writing-essay {
            background: #fafafa;
            border-left: 4px solid #1976d2;
            padding: 1rem 1.25rem;
            margin: 0.75rem 0;
            border-radius: 4px;
            white-space: pre-wrap;
            font-family: Georgia, 'Times New Roman', serif;
            font-size: 0.95rem;
            line-height: 1.6;
            color: #333;
        }
        .writing-task-label {
            font-weight: 600;
            color: #1976d2;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        @media (max-width: 768px) {
            .answer-row {
                grid-template-columns: 40px 1fr 1fr 32px;
                padding: 0.6rem 0.75rem;
                gap: 0.5rem;
                font-size: 0.85rem;
            }
            .answers-header {
                grid-template-columns: 40px 1fr 1fr 32px;
                gap: 0.5rem;
                font-size: 0.75rem;
            }
            .results-summary { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="dashboard-wrapper">
        <header class="dashboard-header">
            <div class="header-content">
                <img src="assets/icons/Logo Big.png" alt="Innovative Centre" class="header-logo">
                <div class="exam-badge-header">IELTS Academic</div>
                <div class="header-right">
                    <div class="test-info">
                        <span class="level-badge">Results</span>
                    </div>
                    <a href="student-dashboard.html" class="back-btn">&#8592; Back to Dashboard</a>
                </div>
            </div>
        </header>

        <main class="dashboard-main">
            <div class="container">
                <div class="welcome-section">
                    <h1 id="welcomeText" class="welcome-title">My Answers &amp; Results</h1>
                    <p id="studentDetails" class="student-id"></p>
                </div>

                <div id="loadingState" class="loading-state">
                    <div class="spinner"></div>
                    <p>Loading your answers...</p>
                </div>

                <div id="errorState" class="error-banner" style="display:none;"></div>

                <div id="resultsContent" style="display:none;">
                    <div class="results-summary" id="summaryCards"></div>

                    <div class="results-section" id="readingSection" style="display:none;">
                        <div class="section-header">
                            <h2>Reading</h2>
                            <span class="score-badge" id="readingScore"></span>
                        </div>
                        <div class="answers-header">
                            <span>Q#</span>
                            <span>Your Answer</span>
                            <span>Correct Answer</span>
                            <span></span>
                        </div>
                        <div class="answers-grid" id="readingAnswers"></div>
                    </div>

                    <div class="results-section" id="listeningSection" style="display:none;">
                        <div class="section-header">
                            <h2>Listening</h2>
                            <span class="score-badge" id="listeningScore"></span>
                        </div>
                        <div class="answers-header">
                            <span>Q#</span>
                            <span>Your Answer</span>
                            <span>Correct Answer</span>
                            <span></span>
                        </div>
                        <div class="answers-grid" id="listeningAnswers"></div>
                    </div>

                    <div class="results-section" id="writingSection" style="display:none;">
                        <div class="section-header">
                            <h2>Writing</h2>
                            <span class="score-badge" id="writingScore"></span>
                        </div>
                        <div id="writingContent"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API_BASE = 'http://localhost:3002';
        let studentId, studentName, mockNumber;

        document.addEventListener('DOMContentLoaded', init);

        function init() {
            studentId = localStorage.getItem('studentId');
            studentName = localStorage.getItem('studentName');
            mockNumber = localStorage.getItem('selectedMock') || '1';

            if (!studentId || !studentName) {
                window.location.href = 'index.html';
                return;
            }

            document.getElementById('welcomeText').textContent = studentName + "'s Answers & Results";
            document.getElementById('studentDetails').textContent = 'ID: ' + studentId + ' \u2022 Mock ' + mockNumber;

            loadResults();
        }

        async function loadResults() {
            try {
                const subsResp = await fetchJSON(API_BASE + '/my-submissions?student_id=' + encodeURIComponent(studentId) + '&student_name=' + encodeURIComponent(studentName) + '&mock_number=' + encodeURIComponent(mockNumber)).catch(() => ({ success: false, submissions: [] }));
                const submissions = (subsResp && subsResp.submissions) || [];

                // Latest submission per skill
                const bySkill = {};
                submissions.forEach(s => {
                    if (!bySkill[s.skill] || new Date(s.created_at) > new Date(bySkill[s.skill].created_at)) {
                        bySkill[s.skill] = s;
                    }
                });

                // Fetch answer keys per skill (in parallel, swallow errors)
                const nameParam = '&student_name=' + encodeURIComponent(studentName);
                const [readKeysResp, listenKeysResp] = await Promise.all([
                    fetchJSON(API_BASE + '/my-answer-keys?mock=' + encodeURIComponent(mockNumber) + '&skill=reading&student_id=' + encodeURIComponent(studentId) + nameParam).catch(() => ({ success: false })),
                    fetchJSON(API_BASE + '/my-answer-keys?mock=' + encodeURIComponent(mockNumber) + '&skill=listening&student_id=' + encodeURIComponent(studentId) + nameParam).catch(() => ({ success: false }))
                ]);

                const readKeys = (readKeysResp && readKeysResp.success) ? readKeysResp.answers : {};
                const listenKeys = (listenKeysResp && listenKeysResp.success) ? listenKeysResp.answers : {};

                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('resultsContent').style.display = 'block';

                const readSub = bySkill['reading'];
                const listenSub = bySkill['listening'];
                const writeSub = bySkill['writing'];

                const readAnswers = (readSub && readSub.answers) || tryParseJSON(localStorage.getItem('readingAnswers'));
                const listenAnswers = (listenSub && listenSub.answers) || tryParseJSON(localStorage.getItem('listeningAnswers'));
                const writeAnswers = (writeSub && writeSub.answers) || tryParseJSON(localStorage.getItem('writingAnswers'));

                buildSummary(readSub, listenSub, writeSub, readAnswers, listenAnswers, readKeys, listenKeys);

                if (readAnswers && Object.keys(readAnswers).length > 0) {
                    renderAnswerSection('reading', readAnswers, readKeys, readSub);
                }
                if (listenAnswers && Object.keys(listenAnswers).length > 0) {
                    renderAnswerSection('listening', listenAnswers, listenKeys, listenSub);
                }
                if (writeAnswers && Object.keys(writeAnswers).length > 0) {
                    renderWritingSection(writeAnswers, writeSub);
                }

                if (!readAnswers && !listenAnswers && !writeAnswers) {
                    showEmptyState();
                }
            } catch (err) {
                console.error('Failed to load results:', err);
                document.getElementById('loadingState').style.display = 'none';
                showLocalFallback();
            }
        }

        function showEmptyState() {
            document.getElementById('resultsContent').innerHTML =
                '<div class="empty-state">' +
                '<p>No answers found yet.</p>' +
                '<p style="font-size:0.9rem; color:#999;">Complete your test modules first, then come back here to review your answers.</p>' +
                '<a href="student-dashboard.html" class="module-button" style="display:inline-block; margin-top:1.5rem; max-width:260px; text-align:center; text-decoration:none;">Go to Dashboard</a>' +
                '</div>';
        }

        function showLocalFallback() {
            const readLocal = tryParseJSON(localStorage.getItem('readingAnswers'));
            const listenLocal = tryParseJSON(localStorage.getItem('listeningAnswers'));
            const writeLocal = tryParseJSON(localStorage.getItem('writingAnswers'));

            if (readLocal || listenLocal || writeLocal) {
                document.getElementById('errorState').style.display = 'block';
                document.getElementById('errorState').textContent = 'Could not reach the server. Showing your locally saved answers (scores unavailable).';
                document.getElementById('resultsContent').style.display = 'block';
                if (readLocal && Object.keys(readLocal).length > 0) renderAnswerSection('reading', readLocal, {}, null);
                if (listenLocal && Object.keys(listenLocal).length > 0) renderAnswerSection('listening', listenLocal, {}, null);
                if (writeLocal && Object.keys(writeLocal).length > 0) renderWritingSection(writeLocal, null);
                buildSummary(null, null, null, readLocal, listenLocal, {}, {});
            } else {
                document.getElementById('errorState').style.display = 'block';
                document.getElementById('errorState').innerHTML = 'Could not load your results. Please check that the server is running and <a href="student-dashboard.html">try again</a>.';
            }
        }

        function buildSummary(readSub, listenSub, writeSub, readAnswers, listenAnswers, readKeys, listenKeys) {
            const cards = document.getElementById('summaryCards');
            cards.innerHTML = '';

            const readCount = readAnswers ? Object.keys(readAnswers).length : 0;
            const listenCount = listenAnswers ? Object.keys(listenAnswers).length : 0;

            let readCorrect = 0, listenCorrect = 0;
            const hasReadKeys = readKeys && Object.keys(readKeys).length > 0;
            const hasListenKeys = listenKeys && Object.keys(listenKeys).length > 0;

            if (hasReadKeys && readAnswers) {
                for (const k in readAnswers) {
                    if (isCorrect(readAnswers[k], readKeys[k])) readCorrect++;
                }
            }
            if (hasListenKeys && listenAnswers) {
                for (const k in listenAnswers) {
                    if (isCorrect(listenAnswers[k], listenKeys[k])) listenCorrect++;
                }
            }

            const totalAnswered = readCount + listenCount;
            const totalCorrect = readCorrect + listenCorrect;
            const hasAnyKeys = hasReadKeys || hasListenKeys;
            const totalKeyQuestions = (hasReadKeys ? Object.keys(readKeys).length : 0) + (hasListenKeys ? Object.keys(listenKeys).length : 0);

            addSummaryCard(cards, totalAnswered, 'Questions Answered', false);
            if (hasAnyKeys) {
                addSummaryCard(cards, totalCorrect + ' / ' + totalKeyQuestions, 'Correct Answers', true);
                const pct = totalKeyQuestions > 0 ? Math.round((totalCorrect / totalKeyQuestions) * 100) : 0;
                addSummaryCard(cards, pct + '%', 'Score', true);
            }

            let submitted = 0;
            if (readSub) submitted++;
            if (listenSub) submitted++;
            if (writeSub) submitted++;
            addSummaryCard(cards, submitted + ' / 3', 'Modules Submitted', false);
        }

        function addSummaryCard(container, value, label, highlight) {
            const card = document.createElement('div');
            card.className = 'summary-card' + (highlight ? ' highlight' : '');
            card.innerHTML = '<div class="summary-value">' + value + '</div><div class="summary-label">' + label + '</div>';
            container.appendChild(card);
        }

        function renderAnswerSection(sectionId, answers, answerKeys, submission) {
            const section = document.getElementById(sectionId + 'Section');
            const grid = document.getElementById(sectionId + 'Answers');
            const scoreBadge = document.getElementById(sectionId + 'Score');
            section.style.display = 'block';
            grid.innerHTML = '';

            if (submission && submission.score !== null && submission.score !== undefined) {
                scoreBadge.className = 'score-badge scored';
                scoreBadge.textContent = 'Score: ' + submission.score + '/40' + (submission.band_score ? ' (Band ' + submission.band_score + ')' : '');
            } else if (submission) {
                scoreBadge.className = 'score-badge pending';
                scoreBadge.textContent = 'Pending Review';
            } else {
                scoreBadge.className = 'score-badge not-submitted';
                scoreBadge.textContent = 'Not Submitted';
            }

            const hasKeys = answerKeys && Object.keys(answerKeys).length > 0;
            const sortedKeys = Object.keys(answers).sort((a, b) => parseInt(a, 10) - parseInt(b, 10));

            sortedKeys.forEach(key => {
                const qNum = parseInt(key, 10);
                if (isNaN(qNum)) return;
                const studentAnswer = answers[key] || '';
                const correctAnswer = hasKeys ? (answerKeys[key] || '') : '';
                const correct = hasKeys && correctAnswer ? isCorrect(studentAnswer, correctAnswer) : null;

                const row = document.createElement('div');
                row.className = 'answer-row' + (correct === true ? ' correct' : correct === false ? ' incorrect' : ' no-key');
                row.innerHTML =
                    '<span class="q-number">Q' + qNum + '</span>' +
                    '<span class="student-answer">' + (escapeHtml(studentAnswer) || '<em style="color:#bbb">No answer</em>') + '</span>' +
                    '<span class="correct-answer">' + (hasKeys ? (formatAnswer(correctAnswer) || '\u2014') : '<em style="color:#bbb">No answer key</em>') + '</span>' +
                    '<span class="result-icon ' + (correct === true ? 'check' : correct === false ? 'cross' : 'dash') + '">' + (correct === true ? '\u2713' : correct === false ? '\u2717' : '\u2014') + '</span>';
                grid.appendChild(row);
            });
        }

        function renderWritingSection(answers, submission) {
            const section = document.getElementById('writingSection');
            const content = document.getElementById('writingContent');
            const scoreBadge = document.getElementById('writingScore');
            section.style.display = 'block';

            if (submission && submission.score !== null && submission.score !== undefined) {
                scoreBadge.className = 'score-badge scored';
                scoreBadge.textContent = 'Score: ' + submission.score + (submission.band_score ? ' (Band ' + submission.band_score + ')' : '');
            } else if (submission) {
                scoreBadge.className = 'score-badge pending';
                scoreBadge.textContent = 'Pending Review';
            } else {
                scoreBadge.className = 'score-badge not-submitted';
                scoreBadge.textContent = 'Not Submitted';
            }

            content.innerHTML = '';
            // Writing answers are typically { task1: "...", task2: "..." } or { 1: "...", 2: "..." }
            const taskKeys = Object.keys(answers).sort();
            taskKeys.forEach(taskKey => {
                const text = answers[taskKey];
                if (!text || typeof text !== 'string') return;
                const wordCount = text.trim().split(/\s+/).filter(Boolean).length;
                const block = document.createElement('div');
                block.innerHTML =
                    '<div class="writing-task-label">' + escapeHtml(taskKey) + ' \u00b7 ' + wordCount + ' words</div>' +
                    '<div class="writing-essay">' + escapeHtml(text) + '</div>';
                content.appendChild(block);
            });
        }

        function isCorrect(studentAnswer, correctAnswer) {
            if (!correctAnswer) return null;
            const normalize = (s) => String(s || '').trim().toLowerCase().replace(/[.,;:!?'"()\-\\]/g, '').replace(/\s+/g, ' ');

            let accepted = [];
            if (Array.isArray(correctAnswer)) {
                accepted = correctAnswer;
            } else if (typeof correctAnswer === 'string') {
                if (correctAnswer.includes('|')) accepted = correctAnswer.split('|');
                else if (correctAnswer.includes('/')) accepted = correctAnswer.split('/');
                else accepted = [correctAnswer];
            } else {
                accepted = [correctAnswer];
            }

            const studentNorm = normalize(studentAnswer);
            return accepted.some(a => normalize(a) === studentNorm);
        }

        function formatAnswer(answer) {
            if (!answer) return '';
            if (Array.isArray(answer)) return answer.map(a => escapeHtml(a)).join(' / ');
            if (typeof answer === 'string' && answer.includes('|')) return answer.split('|').map(a => escapeHtml(a.trim())).join(' / ');
            return escapeHtml(answer);
        }

        function escapeHtml(str) {
            if (str == null) return '';
            const div = document.createElement('div');
            div.textContent = String(str);
            return div.innerHTML;
        }

        function tryParseJSON(str) {
            if (!str) return null;
            try { return JSON.parse(str); } catch { return null; }
        }

        async function fetchJSON(url) {
            const res = await fetch(url);
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const text = await res.text();
            try { return JSON.parse(text); } catch { throw new Error('Invalid JSON response'); }
        }
    </script>
</body>
</html>
