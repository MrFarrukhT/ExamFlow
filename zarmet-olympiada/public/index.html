<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Zarmed University — C1 Olympiada</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link rel="stylesheet" href="css/styles.css">
</head>
<body class="zu-welcome">
<div class="page page--narrow">
  <header class="zu-header">
    <img src="assets/logo.png" alt="Zarmed University" class="zu-logo">
    <h1>C1 Language Olympiada</h1>
    <p class="zu-subtitle">English &amp; German &middot; Reading + Listening</p>
  </header>

  <main>
  <form id="start-form" class="zu-form" autocomplete="off">
    <div class="zu-field">
      <label for="f-name">Full name</label>
      <input type="text" id="f-name" required minlength="2" maxlength="80" autocomplete="off">
    </div>
    <div class="zu-field">
      <label for="f-group">Group (optional)</label>
      <input type="text" id="f-group" maxlength="40" autocomplete="off">
    </div>
    <div class="zu-field">
      <label for="f-lang">Language</label>
      <select id="f-lang" required>
        <option value="english-c1">English — C1 Advanced</option>
        <option value="german-c1">German — C1 (Goethe)</option>
      </select>
    </div>
    <button type="submit" class="zu-btn">Continue</button>
    <p id="err" class="zu-error" hidden></p>
  </form>
  </main>
</div>

<script src="js/app.js"></script>
</body>
</html>
