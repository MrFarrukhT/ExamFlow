<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Zarmed Olympiada — Submitted</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link rel="stylesheet" href="css/styles.css">
</head>
<body class="zu-welcome">
<div class="page page--narrow">
  <header class="zu-header">
    <img src="assets/logo.png" alt="Zarmed University" class="zu-logo">
    <h1>Thank you</h1>
    <p class="zu-subtitle">Your test has been submitted.</p>
  </header>
  <p class="zu-done-instruction">Please wait for your invigilator.</p>
</div>
<script>
// German C1 localization — runs BEFORE the rotation clear below so we can
// still read olympiada:lang. If the student came from a German session,
// swap the 4 static strings + html lang + document title. English is the
// default (no-op) so we only pay the DOM work when we actually need it.
(function localize() {
  try {
    var lang = localStorage.getItem('olympiada:lang');
    if (lang !== 'german-c1') return;
    document.documentElement.lang = 'de';
    document.title = 'Zarmed Olympiada — Abgegeben';
    var h1 = document.querySelector('.zu-header h1');
    if (h1) h1.textContent = 'Vielen Dank';
    var subtitle = document.querySelector('.zu-header .zu-subtitle');
    if (subtitle) subtitle.textContent = 'Ihr Test wurde abgegeben.';
    var instruction = document.querySelector('.page > p');
    if (instruction) instruction.textContent = 'Bitte warten Sie auf Ihre Aufsicht.';
  } catch (e) { /* fail silently — English default is still acceptable */ }
})();

// Rotation safety + invigilator key combo (4-corner click, per ADR-037)
// Clear any lingering session state so the next student starts clean.
try {
  Object.keys(localStorage).filter(k => k.startsWith('olympiada:')).forEach(k => localStorage.removeItem(k));
  sessionStorage.clear();
} catch (e) {}

// 4-corner invigilator gate: TL -> TR -> BR -> BL within 3 seconds
(function setupInvigilatorGate() {
  const corners = ['TL', 'TR', 'BR', 'BL'];
  let progress = [];
  let timer = null;

  function reset() { progress = []; if (timer) { clearTimeout(timer); timer = null; } }

  document.addEventListener('click', e => {
    const w = window.innerWidth, h = window.innerHeight;
    const edge = 80;
    let corner = null;
    if (e.clientX < edge && e.clientY < edge) corner = 'TL';
    else if (e.clientX > w - edge && e.clientY < edge) corner = 'TR';
    else if (e.clientX > w - edge && e.clientY > h - edge) corner = 'BR';
    else if (e.clientX < edge && e.clientY > h - edge) corner = 'BL';
    if (!corner) { reset(); return; }

    if (corners[progress.length] === corner) {
      progress.push(corner);
      if (!timer) timer = setTimeout(reset, 3000);
      if (progress.length === corners.length) {
        reset();
        window.location.href = 'index.html';
      }
    } else {
      reset();
    }
  });
})();
</script>
</body>
</html>
