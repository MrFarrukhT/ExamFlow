<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Zarmed Olympiada — Test</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link rel="stylesheet" href="css/styles.css">
</head>
<body class="zu-test-body">

<!-- Top header strip (Cambridge-authentic chrome) -->
<header class="ct-header">
  <div class="ct-header-brand">
    <img src="assets/logo.png" alt="Zarmed University" class="ct-logo">
    <span class="ct-brand-sub">C1 Olympiada</span>
  </div>
  <div class="ct-header-id">
    <span class="ct-header-id-label">Candidate ID</span>
    <span class="ct-header-id-value" id="ct-candidate-id">—</span>
  </div>
  <div class="ct-header-audio">
    <div class="ct-audio-status" id="ct-audio-status" aria-live="polite">
      <span class="ct-speaker-icon" aria-hidden="true"></span>
      <span>Audio is playing</span>
    </div>
  </div>
  <div class="ct-header-right">
    <div class="ct-timer" id="ct-timer">--:--</div>
  </div>
</header>

<!-- Instruction banner -->
<div class="ct-banner-wrap">
  <section class="ct-banner" id="ct-banner">
    <span class="ct-banner-title" id="ct-banner-title">Loading…</span>
    <span class="ct-banner-body" id="ct-banner-body"></span>
  </section>
</div>

<!-- Main content -->
<main class="ct-main" id="ct-main"></main>

<!-- Bottom navigator -->
<nav class="ct-bottom-nav" id="ct-nav">
  <div class="ct-nav-parts" id="ct-nav-parts"></div>
  <div class="ct-nav-arrows">
    <button class="ct-nav-arrow ct-nav-arrow--prev" id="ct-prev" aria-label="Previous">←</button>
    <button class="ct-nav-arrow ct-nav-arrow--next" id="ct-next" aria-label="Next">→</button>
    <button class="ct-nav-finish" id="ct-finish" aria-label="Finish">✓</button>
  </div>
</nav>

<script src="js/test.js"></script>
</body>
</html>
