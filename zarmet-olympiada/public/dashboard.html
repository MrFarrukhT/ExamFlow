<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Zarmet Olympiada — Modules</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="page">
  <header class="zu-header">
    <div class="zu-shield">ZU</div>
    <h1>Zarmet University</h1>
    <p class="zu-subtitle">C1 Language Olympiada</p>
  </header>

  <div class="zu-welcome-panel">
    <p class="zu-welcome-name" id="welcome-name">Welcome</p>
    <p class="zu-welcome-meta" id="welcome-meta">—</p>
  </div>

  <section class="zu-modules-section" id="modules-section">
    <h2>Select a Module to Begin</h2>
    <div class="zu-modules-grid" id="modules-grid"></div>
  </section>

  <section id="completion-section" hidden>
    <div class="zu-completion-banner">
      <div class="zu-check">✓</div>
      <h2>All Sections Complete</h2>
      <p>You have finished all test modules. Please remain seated and wait for your invigilator.</p>
    </div>
  </section>
</div>

<script src="js/dashboard.js"></script>
</body>
</html>
