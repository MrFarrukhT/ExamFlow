<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Zarmed Olympiada — Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" href="assets/icon.png">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="page page--wide" id="admin-page">
  <header class="zu-header">
    <img src="assets/logo.png" alt="Zarmed University" class="zu-logo">
    <h1>Olympiada Results</h1>
    <p class="zu-subtitle">Invigilator / admin view</p>
  </header>

  <main>
  <div id="login-view" class="zu-login-wrap">
    <form id="login-form" class="zu-form" autocomplete="off">
      <div class="zu-field">
        <label for="pw">Admin password</label>
        <input type="password" id="pw" required aria-describedby="login-err">
      </div>
      <button type="submit" class="zu-btn">Unlock</button>
      <p id="login-err" class="zu-error" role="alert" hidden></p>
    </form>
  </div>

  <div id="list-view" hidden>
    <div class="zu-toolbar">
      <input type="search" id="search" placeholder="Search by name..." class="zu-search-input" autocomplete="off">
      <select id="filter-lang" class="zu-filter-select">
        <option value="">All Languages</option>
        <option value="english-c1">English C1</option>
        <option value="german-c1">German C1</option>
      </select>
      <select id="filter-skill" class="zu-filter-select">
        <option value="">All Skills</option>
        <option value="reading">Reading</option>
        <option value="listening">Listening</option>
      </select>
    </div>
    <div class="zu-toolbar">
      <button class="zu-btn zu-btn--ghost" id="refresh">Refresh</button>
      <button class="zu-btn zu-btn--ghost" id="export-csv">Export CSV</button>
      <button class="zu-btn zu-btn--ghost" id="export-json">Export JSON</button>
      <button class="zu-btn zu-btn--ghost" id="export-pdf">Export PDF</button>
    </div>
    <div class="zu-admin-table-wrap">
      <table class="zu-admin-table" id="rows-table">
        <thead>
          <tr>
            <th>Finished</th>
            <th>Student</th>
            <th>Group</th>
            <th>Language</th>
            <th>Skill</th>
            <th>Score</th>
          </tr>
        </thead>
        <tbody id="rows-body"></tbody>
      </table>
    </div>
    <div id="empty-state" class="zu-empty-state" hidden>
      <p><strong>No submissions yet.</strong></p>
      <p>Results will appear here as students finish their modules.</p>
    </div>
  </div>

  <div id="detail-view" hidden>
    <button class="zu-btn zu-btn--ghost" id="back-btn">← Back to list</button>
    <div id="detail-body" class="zu-detail-body"></div>
  </div>
  </main>
</div>

<script src="js/admin.js"></script>
</body>
</html>
