<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Zarmed University — C1 Olympiada</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" href="assets/icon.png">
<link rel="stylesheet" href="css/styles.css">
</head>
<body class="zu-welcome">
<div class="page page--narrow">
  <header class="zu-header">
    <img src="assets/logo.png" alt="Zarmed University" class="zu-logo">
    <h1>C1 Language Olympiada</h1>
    <p class="zu-subtitle">English &amp; German &middot; Reading + Listening</p>
  </header>

  <main>
  <!-- Resume section — shown when there are unfinished sessions -->
  <section id="resume-section" class="zu-resume-section" hidden>
    <h2>Continue Exam</h2>
    <p class="zu-resume-hint">Select your session to continue where you left off.</p>
    <div id="resume-list" class="zu-resume-list"></div>
    <hr class="zu-divider">
    <p class="zu-resume-or">Or start a new session below</p>
  </section>

  <form id="start-form" class="zu-form" autocomplete="one-time-code">
    <div class="zu-field">
      <label for="f-name">Full name</label>
      <input type="text" id="f-name" required minlength="2" maxlength="80" autocomplete="one-time-code" aria-describedby="err">
    </div>
    <div class="zu-field">
      <label for="f-taker-id">Test Taker ID</label>
      <input type="text" id="f-taker-id" maxlength="40" autocomplete="one-time-code">
    </div>
    <div class="zu-field">
      <label for="f-lang">Language</label>
      <select id="f-lang" required>
        <option value="english-c1">English — C1 Advanced</option>
        <option value="german-c1">German — C1 (Goethe)</option>
      </select>
    </div>
    <button type="submit" class="zu-btn">Continue</button>
    <p id="err" class="zu-error" role="alert" hidden></p>
  </form>
  </main>
</div>

<script src="js/app.js"></script>
</body>
</html>
