<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Zarmed Olympiada — Modules</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" href="assets/logo.png">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="page">
  <header class="zu-header">
    <img src="assets/logo.png" alt="Zarmed University" class="zu-logo">
    <h1>C1 Language Olympiada</h1>
    <p class="zu-subtitle">Select a module to begin</p>
  </header>

  <main>
  <div class="zu-welcome-panel">
    <p class="zu-welcome-name" id="welcome-name">Welcome</p>
    <p class="zu-welcome-meta" id="welcome-meta">—</p>
  </div>

  <section class="zu-modules-section" id="modules-section">
    <h2>Select a Module to Begin</h2>
    <div class="zu-modules-grid" id="modules-grid"></div>
  </section>

  <section id="completion-section" hidden>
    <div class="zu-completion-banner">
      <div class="zu-check">✓</div>
      <h2>All Sections Complete</h2>
      <p>You have finished all test modules. Please remain seated and wait for your invigilator.</p>
    </div>
  </section>
  </main>
</div>

<script src="js/dashboard.js"></script>
</body>
</html>
