        - heading "Ratgeber Gesundheit" [level=3] [ref=e72]
        - generic [ref=e73]: "Abnehmen geht effizienter Bisher war der Königsweg für Menschen mit Übergewicht, die abnehmen wollten, ausdauernd zu trainieren. Vergleicht man die schnellen 100-Meter-Läufer mit den besten Marathonläufern der Welt, so fällt einem sofort ins Auge: Ausdauersport scheint zum Erfolg zu führen. Denn während die muskelbepackten Sprinter wie Sumoringer aus einem Gladiatorenfilm wirken, möchte man den ausgedörrten Ausdauersportlern eher mal ein Drei-Gänge-Menü spendieren. Und es klingt ja auch logisch: Wer ausdauernd läuft, verbraucht mehr Kalorien als jemand, dessen sportlicher Aufwand schon nach zehn Sekunden zu Ende ist. Doch neue Studien zeigen, dass dies nicht der einzige Weg ist. Mehr noch — es geht effizienter, und zwar mit einem intensiven Intervalltraining. Tatsächlich werden bei kurzen Anstrengungen nicht besonders viele Kalorien verbrannt. Aber sie lösen einen Stoffwechselmechanismus aus, der auf eine andere Art und Weise das Trainingsziel in größere Nähe rücken kann. Vorweg: Sport sollte immer so intensiv sein, dass er das Muskelwachstum anregt. »Denn Muskelmasse hat nicht nur während der Arbeit, sondern auch in Ruhe einen erhöhten Kalorienverbrauch«, sagt Winfried Banzer, emeritierter Sportmediziner von der Goethe-Universität in Frankfurt. Durch regelmäßiges Joggen und Radfahren kann es durchaus zum Muskelaufbau kommen, auch wenn der nicht so sichtbar ist. Die Muskelmasse nimmt zu, und damit auch der Grundumsatz an Kalorien. Vor allem im Alter ist dieser Effekt wichtig: Der Rückgang von Muskeln im fortgeschrittenen Alter führt zu einem geringeren Energieverbrauch. Wer nichts dagegen tut, verliert ab dem 25. Lebensjahr natürlicherweise Muskelmasse — mit dem Resultat, dass man mit 80 Jahren nur noch die Hälfte der Muskelmasse hat, die man mit 20 hatte. Der Verlust von drei Kilo Muskeln bedeutet eine Verringerung des Energiegrundumsatzes um etwa 100 Kalorien pro Tag. Wie aber soll das Abnehmen ohne Langstreckenlauf und hohen Kalorienverbrauch funktionieren? Amerikanische Forscher haben gerade im renommierten Fachjournal »Nature« eine Reihe von Untersuchungen publiziert. Ein Stoff namens Lac-Phe ist dabei in den Fokus der Wissenschaftler geraten. Lac-Phe entsteht immer dann, wenn die Anstrengung sehr hoch ist. Als die Forscher den Stoff ihren Testmäusen injizierten, verloren diese deutlich ihre Lust am Fressen. Und als man ihn ihnen über mehrere Tage spritzte, verloren sie — weil sie weniger fraßen — auch an Körpergewicht. Umgekehrt wogen Mäuse, bei denen man genetisch die Bildung von Lac-Phe ausgeschaltet hatte, deutlich mehr als ihre Artgenossen, weil sie einen größeren Appetit hatten. Zudem wollten die Forscher wissen, ob man den Lac-Phe-Pegel nicht nur per Spritze, sondern auch natürlicherweise — mit Sport — nach oben bringen kann. Also wurden acht junge Männer gebeten, drei unterschiedliche Formen des Körpertrainings zu absolvieren: ein 90-minütiges moderates Ausdauertraining auf dem Heimtrainer, ein Krafttraining an Hanteln und ein hochintensives Intervalltraining mit mehreren sehr kurzen Belastungsphasen. Im Anschluss an die jeweiligen Einheiten wurde der Lac-Phe-Wert im Blut gemessen. Das Ergebnis: Bei allen Trainingsformen ging der Lac-Phe-Pegel nach oben, doch am deutlichsten war der Anstieg im Anschluss an das hochintensive Intervalltraining, gefolgt vom Krafttraining. Bei intensiven Kurzbelastungen wird also im Körper besonders viel Lac-Phe freigesetzt. In einer anderen kürzlich publizierten Studie wurde der Effekt von Intensivtraining bei 42 mäßig übergewichtigen Menschen genauer untersucht. Binnen vier Wochen reduzierte sich der Taillenumfang bei allen Probanden um rund zwei Zentimeter und der Körperfettanteil um etwa einen Prozentpunkt. Wissenschaftler fanden heraus, dass Intensivtraining zeitsparend und dennoch effizient ist: Die Intensiv-Sportler waren nur knapp 24 Minuten täglich aktiv, während die Ausdauer-Walker 60 Minuten pro Tag unterwegs waren — und dennoch erzielten beide Gruppen vergleichbare Effekte."
