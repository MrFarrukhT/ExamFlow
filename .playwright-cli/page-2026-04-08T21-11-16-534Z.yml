    - generic [ref=e36]:
      - heading "Part 6 — Cross-text multiple matching (Questions 37–40)" [level=3] [ref=e37]
      - generic [ref=e38]: You are going to read four extracts from articles in which park rangers discuss national parks. For questions 37–40, choose the answer (A, B, C or D). Each answer may be chosen more than once.
    - main [ref=e40]:
      - group [ref=e42]:
        - generic [ref=e47]:
          - heading "National parks" [level=2] [ref=e48]
          - heading "Park ranger A" [level=3] [ref=e49]
          - paragraph [ref=e50]: Many types of human activity, including hiking, cycling and horse-riding, have an impact on nature. Even small trails used by ecotourists and birdwatchers scare away some sensitive wildlife species or cause them to alter their behaviour. However, visitors help fund the operation of national parks and provide vital income for local people in many parts of the world. Therefore, putting a cap on how many come or banning their sporting activities is not a viable proposition. Introducing 'no-go' zones within a park, on the other hand, would protect wildlife while allowing visitors to enjoy the rest of the park. Such zones could be in more remote locations, away from roads. The majority of national parks already had roads running through them before they were given national park status. Closing these would prove unpopular, and in any case they are necessary infrastructure for both staff and visitors.
          - heading "Park ranger B" [level=3] [ref=e51]
          - paragraph [ref=e52]: National parks expose people to nature and increase the likelihood that they’ll support environmental protection measures. If we introduce ceilings on how many can enjoy the parks, we risk losing that support. Having said that, I do think some changes are called for. Thanks to photo-sharing websites, picturesque vistas are being completely spoiled by crowds of tourists desperate to take the perfect selfie, and ecology should always be at the forefront of what we do. There are other issues too. Rather than continuing to allow outdoor sports such as off-road cycling in national parks, we need to identify more suitable spaces. And even for less damaging visitor pastimes, human activity must be restricted to particular sectors of the parks, using signage and physical barriers, while retaining the remainder for wildlife to live without human disturbance.
          - heading "Park ranger C" [level=3] [ref=e53]
          - paragraph [ref=e54]: The activities people do in national parks are changing, and park authorities need to keep up with that, whether it means introducing mountain bike trails or improving wi-fi access so tourists can use the internet. And park managers need to embrace the data which technology can provide. For example, GPS tagging shows that half of all photos by visitors are taken in less than 1% of each park. In other words, most visitors use a small, highly trafficked area of each park. Therefore, there’s no need to set up visitor-free areas — there are plenty of those already. Roads are another matter, however. Existing ones need to be re-routed to avoid national parks, and new ones constructed outside park boundaries. Of course, this means other transport links must be improved. We have to allow as many people to visit as want to. If people can’t go to national parks, they won’t want to protect them, and we’ll lose the parks completely.
          - heading "Park ranger D" [level=3] [ref=e55]
          - paragraph [ref=e56]: Can national parks continue to embrace ever-increasing levels of tourism while retaining what makes them unique? I can’t see how. At one US national park, for example, a site which used to attract a few thousand visitors annually now gets two million a year, mainly because of tourists posting pictures of it online. This isn’t an isolated case, and the consequences are disastrous — something we need to communicate to visitors. The time has come to draw a line. Parks must decide on a maximum number of people who can enter on a daily basis, both to protect wildlife and habitats and to ensure these continue to be pleasant places for people to visit. We also need to look at visitor activities. For example, forests maintained for commercial harvest offer a more appropriate setting for sports such as cross country cycling than national parks. Roads through national parks should also be closed so that traffic no longer goes through them, and visitors encouraged to travel to parks by other means.
