          - heading "Bridges for wildlife" [level=2] [ref=e48]
          - paragraph [ref=e49]: The act of annual migration is common to many species. They migrate towards more favourable climates, or return to breeding sites and feeding grounds. Roads and traffic, however, can pose a significant threat to some species' survival. To address this problem, environmentalists and engineers around the world have put their heads together to devise 'wildlife bridges'.
          - paragraph [ref=e50]: In Canada, grizzly bears, wolverines and toads are just a few of the species making use of grass-covered, cement bridges that cross the Trans-Canada Highway. Similarly, on Australia's Christmas Island, a five-metre-high bridge across a busy road enables red crabs to pass safely from the rainforest to the ocean. The bridge has significantly reduced their casualty rate and averted traffic chaos.
          - paragraph [ref=e51]: In Sweden, plans are being drawn up for a series of bridges across a main highway, which will allow the country's 250,000 reindeer to reach the mountains. Engineers must take account of the fact that reindeer are easily frightened by traffic, and so make the bridge walls high enough to prevent the deer from jumping off.
