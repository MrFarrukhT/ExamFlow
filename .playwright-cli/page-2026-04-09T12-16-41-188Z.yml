        - main [ref=f1e40]:
          - group [ref=f1e42]:
            - generic [ref=f1e47]:
              - heading "Athletes under extreme pressure sometimes can’t perform. This is called ‘choking’, but why does it happen?" [level=2] [ref=f1e48]
              - paragraph [ref=f1e49]: Cricket is a simple game played with a ball and a bat. One player runs up and bowls the ball towards a player from the opposing team, who tries to hit it. This should be relatively straightforward, but when Scott Boswell stood at the start of his bowling run-up at the 2001 English cricket cup final, he froze, unable to do the very thing he had been practising for years, uncomprehending as to what this incapacitating sensation was. It should have been the highlight of his career, but trepidation had been flowing through him since he’d found out he’d been selected. It had been touch and go — his man-of-the-match performance in the semi-final had earned him the right to play, but Boswell had lost form in the intervening three weeks, and his place had become less secure. At 10 p.m. the night before, the coach had asked Boswell whether he was up for it — the seed of doubt had been planted.
              - paragraph [ref=f1e50]: Sports anxiety is a reaction to pressure in a match, and an athlete’s failure to manage it at a crucial moment can lead to a catastrophic drop in performance. The symptoms of anxiety are psychological — worry and fear — and physiological — including sweaty palms and an increased heart rate. This is something we might all go through, but it is clear we mere amateurs experience something which lacks the same dreadful intensity. Anxiety uses up attention and working memory, hindering performance. Athletes find themselves overthinking normally automatic processes. All this can result in an athlete ‘choking’ and this was Boswell’s experience.
              - paragraph [ref=f1e51]: When non-elite athletes get anxious, it hampers their performance. In the last 30 seconds of tight basketball games players are 5.8% less likely to score than at other moments in the game. However, elite athletes manage to channel the anxiety they feel positively. They are also more adept at brushing off disappointments during competition. The champion golfer Annika Sorenstam jokes that she never hit a bad shot in her life because she doesn’t dwell on them. Lesser players can be consumed by a blunder, but Sorenstam quickly grasps what’s happened, files it away at the back of her mind, then gets on with the business of trying to repair the damage.
              - paragraph [ref=f1e52]: Anxiety doesn’t just affect individuals. In everyday life, people can suffer by dint of simply being assigned to a collective in terms of, for example, age or gender. In sport, the team you play on can have a similar effect. In one study on stereotyping, scientists asked older and younger people to do some tasks that tested memory and the data produced revealed some fascinating insights into how we act. Some older participants were told that older and younger people did equally well on the tasks; others that younger people did better. When older people were told that they were just as capable as younger people, they subsequently achieved scores similar to the young people in the study. When they were told that they tended to do worse, they indeed did worse on the tasks. One sporting example of this ‘stereotype effect’ is provided by the South African cricket team. Between 1999 and 2017, South Africa played 19 major international tournaments and never qualified for a final. It was hard to deny that at crucial moments mistakes were consistently made which were explicable only by reference to a collective form of choking, the fact that they were playing together in a particular group.
              - paragraph [ref=f1e53]: So if anxiety in sport is such a pervasive factor, affecting individuals and groups alike, what can be done to remedy it? While some athletes are gifted with innate psychological advantages, there’s nothing to suggest that coaches can’t enable all players to benefit by employing a few simple ideas. It is often said that nothing can exactly equal the high stress of the biggest moments in matches. This notwithstanding, more pressurised realistic coaching can help athletes begin to cope with pressure on the field. A consequence of this will be that coaching can also help players develop a series of automatic reactions under pressure, without making them less alert to the unexpected, so they don’t need to think consciously and worry about their actions.
