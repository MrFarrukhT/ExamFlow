  - main [ref=e19]:
    - generic [ref=e86]:
      - generic [ref=e87]:
        - heading "An interview with Frank Gehry, world-famous architect" [level=3] [ref=e88]
        - generic [ref=e89]:
          - text: Rowan Moore spoke to the award-winning genius behind iconic buildings such as the Guggenheim Museum in Spain and the Walt Disney Concert Hall in Los Angeles on his 90th birthday.
          - strong [ref=e90]: A —
          - text: "'I've taken up flying,' says the American-Canadian architect Frank Gehry, as he sits opposite me in his Los Angeles office. 'A little bit.' Then he tells the story of how, in his youth, his cousin had a plane and would take him up in it. How he'd wanted to do this again, and ended up flying with Harrison Ford, the Hollywood superstar. This story is typical Gehry. It shows his sociable nature. He has a fascination with celebrity and high achievers, as many photographs around his office attest. Fame is definitely a thing with Gehry, but an ambiguous one. 'I find it very comforting to be here in Los Angeles because there are no spotlights except on the Hollywood film industry here. It gives people like me a kind of cloud cover,' he says. It's not untypical that a boast ('I've taken up flying') is followed by deprecation ('A little bit'). Most of all, the plane story captures his addiction to adventure — physical, emotional and imaginative. Many people credit this trait as driving the spirit of experimentation and playfulness that is evident in Gehry's architecture, which, while sometimes criticised for its crudeness and unfinished look, can never be ignored. The sense of fun is ever-present in his buildings that often seem to blur or transcend categories."
          - strong [ref=e91]: B —
          - text: His love of adventure and leaps into the unknown can also be seen in work Gehry did early on in his career with schoolchildren, in collaboration with his teacher sister, which was captured in a documentary directed by Jon Boorstin. The children built an imaginary city out of painted blocks and cardboard — coincidentally a sort of haphazard anticipation of the architecture Gehry would later do. They debated planning issues and elected a mayor. The ensuing heated discussions were all too chaotic for the children's regular teacher (Gehry now regrets his lack of tact when dealing with her), who cancelled the project. 'The point she missed,' Gehry says in the film, 'is that the conflict, when they start arguing with each other, is the real involvement in the city planning process that they were robbed of.' This work with the schoolchildren is one of a number of 'cliff jumps' in Gehry's life.
          - strong [ref=e92]: C —
          - text: The most pivotal jump concerns the house in Santa Monica where Gehry lived until recently with his wife, Berta, which he remodelled in the 1970s with all the disrespect for convention for which he was not yet world-famous — jagged angles, rough edges, and unglamorous materials such as plywood and corrugated metal. At that time, Gehry had built up a sizeable portfolio designing not-bad but not-exceptional commercial projects — apartment blocks, offices, shopping centres — with a sideline doing houses and studios for his artist friends. In 1980, he hosted a dinner at his house to celebrate the opening of one of his distinctly bland and uninspiring shopping centres. His developer client looked around the house. 'Is this what you like?' he asked. Gehry said he did. 'Well, if you like this you can't possibly like the shopping centre. Why are you doing it?' So Gehry, aged a little past 50, stopped working on all his commercial projects. He chose, almost, to start over again.
          - strong [ref=e93]: D —
          - text: "As midlife crises go, it was one of the more creative and productive ones. If Gehry struggled for a while, he would eventually build up a reputation based on small- to medium-sized projects: more houses, a law school, a library, an ice rink. With the opening of the Bilbao Guggenheim in 1997, his success became both popular and global. This celebrated constellation of titanium and stone gave its name to a phenomenon — the 'Bilbao effect' — whereby beaten-up old cities would try to reverse their fortunes with spectacular architecture that would attract new visitors. It became the icon of what would be called iconic architecture. Other landmarks followed, such as the Walt Disney Concert Hall in downtown Los Angeles. (In fact, it was commissioned before Bilbao, but drawn out by, among other things, Gehry's efforts to convince clients and funders that he really should be allowed to build it.) By the time the Hollywood director Sydney Pollack made a feature-length documentary about him in 2005, it was common to call Gehry a 'genius', a 'modern master' or 'the greatest architect in the world'."
