        - heading "Zukunftsfragen unserer Gesellschaft" [level=3] [ref=e19]
        - generic [ref=e20]: "Moderne Kunst und ihr Markt A — Zoran Jovanovic, Galerist Es ist doch ganz einfach: Wie jede andere Ware unterliegen auch Kunstobjekte dem Prinzip von Angebot und Nachfrage. Will der Kunstschaffende seine Ware verkaufen, ergibt sich automatisch die Frage, welchen Preis er oder sie für den Kunstgegenstand verlangen kann. Der Geldwert wird nicht nur durch Größe, Aufwand und Materialien bestimmt, sondern auch durch den Bekanntheitsgrad des Objekts oder des Kunstschaffenden. Alle Kosten, die bei der Erstellung des Kunstobjekts anfallen, also zum Beispiel Arbeitszeit, Material, Werbung, Transport, Galerie- und Ausstellungskosten, Mieten, Lebenshaltungskosten und Versicherungen, müssen aufgeschlagen werden, da es selten Massenproduktionen von Kunstobjekten gibt. Wird ein Werk verkauft, so bekommen Galerist*innen und Kunsthändler*innen Provisionen. Verständlicherweise können demnach nur wenige Kunstschaffende vom Verkauf ihrer Kunst leben. Nur wer hochdotierte Kunstpreise bekommt, vielleicht sogar eine Auszeichnung auf einer der zunehmenden Auktionen und zu bekannten Museen ausstellt, darf auf dem Kunstolymp Platz nehmen. Kunden der teuren Kunst gibt es jedoch immer mehr, da die Kluft zwischen Arm und Reich stets größer wird, was auch zu mehr Millionären führt, die gern ein kleines Vermögen für ein Kunstwerk als lohnenswerte Kapitalanlage ausgeben. B — Andrea Huebner, Bildhauerin und Malerin Häufig werde ich gefragt, weshalb meine Bilder so preiswert seien. Das gelingt mir, da ich mir einfach ein zweites Standbein geschaffen habe, indem ich in meinem Atelier junge, talentierte Künstlerinnen und Künstler ausbilde, dadurch Freude an der Kunst vermittle und so genügend Geld verdiene, um davon leben zu können. Ich bin nicht auf Galerien und Ausstellungen angewiesen, was meine Kosten enorm senkt, denn so spare ich Werbung, Provisionen, Mieten usw. Auf diese Weise kann ich meinen künstlerischen Weg konsequent verfolgen, ohne auf die Wünsche zahlungskräftiger Kunden eingehen zu müssen. Ich wollte nie von meiner Kunst leben, denn unter diesem Existenzdruck könnte ich nicht kreativ arbeiten. Künstler verdienen in Deutschland im Durchschnitt ca. 11.000 Euro im Jahr. So gibt es Künstler, die am Existenzminimum leben müssen. Wenn da der Partner oder die Partnerin nicht durch ein geregeltes Einkommen helfen kann, ist ein Überleben fast unmöglich. C — Sithembile Meinhards, Kunsthistorikerin Moderne Kunst ist leider teuer. Ob total weiße Leinwand oder abstrakte Gemälde mit scheinbar wahllos zusammengesetzten Farben: So etwas kann Millionen kosten. Modern Art umfasst den Zeitraum von 1870 bis 1970 und ist sehr breit gefächert. Erwähnt man aber die Kunstepoche gegenüber Straßenpassanten, so stellen sich viele nur eine wilde Kleckserei vor und schütteln mitleidvoll den Kopf. Geschuldet ist diese Auffassung von Moderner Kunst der Tatsache, dass die Künstlerinnen und Künstler nicht mehr naturgetreu darstellen mussten. Dafür gab es ja bereits die Fotografie. So erfuhren die Kunstschaffenden eine Art Befreiung, denn sie konnten nun wählen, warum und wie sie etwas darstellen wollten. Kunst wurde konzeptioneller und anspruchsvoller. Aber diese Veränderung kam nicht bei allen gut an. Umfragen ergaben, dass die Mehrzahl der Bevölkerung moderne Kunstwerke ablehnt; dennoch erreichen viele dieser Werke einen hohen Geldwert. Das liegt natürlich auch daran, dass echte Meisterwerke, egal aus welcher Epoche, selten sind."
