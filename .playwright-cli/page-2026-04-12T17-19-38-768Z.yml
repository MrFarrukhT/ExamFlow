        - heading "What it was like to record my own audiobook" [level=3] [ref=e427]
        - generic [ref=e428]:
          - text: It was around noon on the third gruelling day of recording the audiobook of my novel, The Gargoyle Hunters, when the disembodied voice of my director burst into my headset to inform me that my empty stomach was making noises loud enough to be picked up by the hypersensitive microphone.
          - generic [ref=e430] [cursor=pointer]: "41"
          - text: As it turned out, that had been deceptively simple. All the audiobook producer asked me to do was record myself reading the opening pages of my book in the comfort of my own home. But so I was sure she was in a position to fully evaluate my ability, I also recorded a comic sequence from another section of the novel, involving some verbal sparring between two teenage boys.
          - generic [ref=e432] [cursor=pointer]: "42"
          - text: I was thrilled to hear it, but little did I know that reading into your phone for 16 minutes on a lazy Sunday at home in no way prepares you for the arduous ordeal of being locked in a tiny recording booth for six or seven hours a day — reading, reading, reading, with only the voice of a distant director for occasional company.
          - generic [ref=e433] [cursor=pointer]:
            - generic [ref=e434]: "43"
            - text: CIt seemed my solo performance had inadvertently become a duet. I hugged a pillow to my abdomen to mask the rumbling, and managed to complete the chapter. The truth is that the marathon task of recording my own audiobook over four long days was proving far more demanding than I had expected from my audition.
          - text: This familiarity with the material wasn't enough, however. Before the promise of lunch was even a glimmer on the horizon, weariness set in, and it dawned on me that this was going to be an exhausting, long-distance slog during which, paradoxically, it was essential that I sounded alert and energetic the entire time.
          - generic [ref=e436] [cursor=pointer]: "44"
          - text: To make matters more difficult, I was fighting a nasty cold. Still, I'm a hard worker, and as the hours and days progressed, I began to figure out the craft of audiobook narration. I became acutely sensitized to the subtleties of mouth moisture, which generated sensations and sounds I had never in my life spent a moment considering.
          - generic [ref=e438] [cursor=pointer]: "45"
          - text: It occurred to me that my efforts in this regard were pretty analogous to what we novelists do. The whole idea is to hide the struggle of creation from the reader so that the words on the page appear to have arrived there with fluency and ease.
          - generic [ref=e440] [cursor=pointer]: "46"
          - text: "I was always very grateful for these tips, and overall, the experience of narrating my own audiobook proved immensely satisfying. As a complete novice with no technical training, I was never going to turn myself into an experienced narrator overnight. But I did have one ace up my sleeve: I happened to know the author's intention behind every line."
      - generic [ref=e442]:
        - heading "Paragraphs" [level=4] [ref=e443]
        - generic [ref=e444] [cursor=pointer]: AIt was my concern about having a stranger narrate episodes such as this that led me to try out for the job in the first place. I had a very specific way I wanted the dialogue to sound, and I wasn't entirely comfortable handing that task over to an unknown voice actor who might not share my take on it. A few days after I sent in my clips, the producer emailed me back to say she was willing to take me on.
        - generic [ref=e445] [cursor=pointer]: BNow, however, I began to pay a lot of attention to them. I developed my own routines around when I needed to sip water, suck on a lozenge, or clear my throat. I found I was at pains to conceal from my listeners the unpleasant realities behind the performance.
        - generic [ref=e446]: CIt seemed my solo performance had inadvertently become a duet. I hugged a pillow to my abdomen to mask the rumbling, and managed to complete the chapter. The truth is that the marathon task of recording my own audiobook over four long days was proving far more demanding than I had expected from my audition.
        - generic [ref=e447] [cursor=pointer]: DTo give me the freedom I needed to generate this sense of flow, the director kept silent and let me plug away, breaking in only when my clothing rustled or my digestive system gurgled in open revolt. But she was a trained actress whose understanding of enunciation proved invaluable, as she always knew just which syllable I should emphasize in order to stop tripping over a word or phrase.
        - generic [ref=e448] [cursor=pointer]: EI turned up on the first day in that naïve state, and sailed through the first couple of chapters. Friends had predicted that performing my own work would be a strange experience, but I always read and re-read my prose aloud as I write. In fact I had probably read each page of my novel aloud 20 or 30 times before I ever leaned forward to speak into that microphone.
        - generic [ref=e449] [cursor=pointer]: FThese I listened to and mimicked endlessly in my free time. On the final day, I walked into the sound studio and told the director that I wanted to re-record those specific lines of the book.
        - generic [ref=e450] [cursor=pointer]: GI began to appreciate that an almost athletic performance was required if we were to complete the reading in four days — the time normally allotted for an actual professional audiobook narrator. A fairly cracking pace would be required. Author or no, there was no glamour here.
