                  - heading "The bonnethead shark's unusual diet" [level=2] [ref=f1e48]
                  - paragraph [ref=f1e49]:
                    - text: When we think of sharks, we often imagine fierce, meat-eating creatures. This might not be the whole picture though. While one species called the bonnethead shark enjoys meat as much as any other, research shows that it also seems to love eating a type of underwater plant called seagrass.
                    - combobox [ref=f1e51]:
                      - option "16" [selected]
                      - option "A"
                      - option "B"
                      - option "C"
                      - option "D"
                      - option "E"
                      - option "F"
                      - option "G"
                      - option "H"
                    - text: This was a surprise to many experts.
                  - paragraph [ref=f1e52]: Bonnetheads are the second smallest sharks in the hammerhead shark family. They can be found off the coasts of North and South America, in places where the water isn't too deep and is therefore warmer.
                  - paragraph [ref=f1e53]:
                    - text: Samantha Leigh, a student at the University of California, became interested in the diet of bonnethead sharks.
                    - combobox [ref=f1e55]:
                      - option "17" [selected]
                      - option "A"
                      - option "B"
                      - option "C"
                      - option "D"
                      - option "E"
                      - option "F"
                      - option "G"
                      - option "H"
                    - text: Previously, it was thought that the sharks only did this accidentally, when they were hunting for fish hiding amongst the plants.
                  - paragraph [ref=f1e56]:
                    - text: Leigh wanted to know more about how well plants provide bonnetheads with what they need to survive and grow. To try and find out, Leigh, together with a team of researchers, started by growing their own seagrass.
                    - combobox [ref=f1e58]:
                      - option "18" [selected]
                      - option "A"
                      - option "B"
                      - option "C"
                      - option "D"
                      - option "E"
                      - option "F"
                      - option "G"
                      - option "H"
                    - text: Then, in the next part of the process, they fed a group of five bonnetheads a diet that was 90% seagrass and 10% meat, for three weeks. During the experiment, the sharks all gained weight.
                    - combobox [ref=f1e60]:
                      - option "19" [selected]
                      - option "A"
                      - option "B"
                      - option "C"
                      - option "D"
                      - option "E"
                      - option "F"
                      - option "G"
                      - option "H"
                  - paragraph [ref=f1e61]:
                    - text: The team believe their discovery will change what scientists think about how sharks feed.
                    - combobox [ref=f1e63]:
                      - option "20" [selected]
                      - option "A"
                      - option "B"
                      - option "C"
                      - option "D"
                      - option "E"
                      - option "F"
                      - option "G"
                      - option "H"
                    - text: And we must work to ensure the protection of all ocean plant life, not just seagrass, as we may well discover that many other sea creatures also depend on plants for food. The bonnethead is the first example of a shark that eats both meat and plants, but it may not be the last.
