        - generic [ref=e45]:
          - heading "Places around the country for outdoor swimming" [level=2] [ref=e46]
          - paragraph [ref=e47]:
            - strong [ref=e48]: "A: Carpenters"
          - paragraph [ref=e49]: This part of the river offers sailing and fishing. There's a short, protected section that's safe for swimming, where you can enjoy music from nearby cafés.
          - paragraph [ref=e50]:
            - strong [ref=e51]: "B: Bankside"
          - paragraph [ref=e52]: This large pool is rarely busy. It's attractive, with old-fashioned changing rooms, and is suitable for swimming lengths and practicing high dives. There are sunbeds for relaxing, enjoying lemonade, or listening to music when the sun shines.
          - paragraph [ref=e53]:
            - strong [ref=e54]: "C: Spring Point"
          - paragraph [ref=e55]: This part of the river is shaded by trees, so the water is cool. It's popular with local swimmers, especially office workers. Facilities include basic changing rooms, a shop, and a café on the bank.
          - paragraph [ref=e56]:
            - strong [ref=e57]: "D: Comptons"
          - paragraph [ref=e58]: This is one of the biggest and most popular outdoor pools in the area. It has a holiday atmosphere with diving boards, bright colors, and is heated. It offers midnight swims in summer and views of the surrounding hills.
          - paragraph [ref=e59]:
            - strong [ref=e60]: "E: Glades"
          - paragraph [ref=e61]: This point in the river has surprisingly high water temperature. You can swim for miles alongside other bathers, ducks, and trees along the bank. Despite many boats, the river is wide enough for swimmers to be safe.
          - paragraph [ref=e62]:
            - strong [ref=e63]: "F: Waterfalls"
          - paragraph [ref=e64]: This fun pool has new facilities, including hot showers. It offers great scenery from the sunbathing deck, looking out to the open countryside. It can be crowded, but is ideal for those who enjoy pop or rock music, which is played all day.
          - paragraph [ref=e65]:
            - strong [ref=e66]: "G: Parkside"
          - paragraph [ref=e67]: This natural lake has a sandy beach for swimming. Tiny fish swim alongside bathers, the water is cool and fresh, and there are well-equipped huts for changing. Windsurfing is available, and there's a shop for forgotten items.
          - paragraph [ref=e68]:
            - strong [ref=e69]: "H: Bluewater"
          - paragraph [ref=e70]: This small pool is beautifully decorated in blue and white. It's filled with salt water from a nearby bay, allowing swimmers to see small sea creatures. There are no high waves, usually warm temperatures, and very little rain, making it perfect for being outdoors.
