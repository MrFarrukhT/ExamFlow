          - emphasis [ref=e32]: You should spend about 20 minutes on Questions 1-13, which are based on Reading Passage 1 on pages 2 and 3.
        - 'heading "The Evolution of Dental Care: From Ancient Practices to Modern Innovations" [level=4] [ref=e33]':
          - text: "The Evolution of Dental Care:"
          - text: From Ancient Practices to Modern Innovations
        - paragraph [ref=e34]: For as long as human beings have had teeth, keeping them in good shape—in fact, keeping them at all—has been a challenge. While historians believe the practice of dentistry may date back to at least 7000 B.C., many centuries passed before professional dental care became widely available. As late as the 19th century, barbers often doubled as surgeons and dentists, yanking teeth as well as cutting hair. The familiar red-and-white striped barber pole of today can be traced to a time when barbers hung bloody rags out to dry after surgical procedures.
        - paragraph [ref=e35]: So, for countless generations of men and women, dental care was largely a do-it-yourself project. The tools available to our ancestors for that purpose have evolved but still bear a striking resemblance to what can be purchased in any drugstore today. While theories about what causes tooth decay have changed over the centuries—from mysterious "tooth-worms" in ancient times to bacteria-breeding plaque today—people understood the importance of keeping their teeth clean.
        - paragraph [ref=e36]: In its day, the completed palace would have comprised four large wings with colonnaded fronts. The north and east wings consisted of suites of private rooms built around courtyards, with a monumental entrance in the middle of the east wing. In the north-east corner there was an assembly hall and at the middle of the east wing, a large ceremonial reception room, and a gallery. The west wing contained state rooms, a large ceremonial room, and a gallery. The south wing included the owner’s private apartments. The palace included as many as 50 mosaic floors, under-floor central heating and a bathhouse. In size, Fishbourne Palace would have been approximately equivalent to some of the great Roman palaces of Italy, and was by far the largest known Roman residence north of the European Alps, at about 500 feet (150 m) square. A team of volunteers and professional archaeologists are involved in an ongoing archaeological excavation on the site of nearby, possibly military, buildings.
        - paragraph [ref=e37]: William Addis, an Englishman, is credited as the first entrepreneur to mass-produce toothbrushes, supposedly creating his prototype in 1780 while in prison on rioting charges. In 1857, H. N. Wadsworth, a Washington, D.C. dentist, received the first U.S. patent for a toothbrush, which he claimed did a better job of scrubbing between the teeth. Numerous other innovations would follow, including the introduction of nylon bristles in 1938.
        - paragraph [ref=e38]: In 1937, American inventor Tomlinson I. Moseley patented a design for an electric toothbrush. The idea failed to catch on, however, until Philippe-Guy Woog, a Swiss scientist, introduced his own model in 1954. By some accounts, Woog's Broxodent electric brush was intended to assist people with limited mobility, but it was soon promoted to the general public. One 1960s magazine ad even called it "the perfect gift for Mother's Day, Father's Day, weddings and graduations."
        - paragraph [ref=e39]: Strangely, toothpaste actually pre-dates the toothbrush. "Around 3,000–5,000 B.C., ancient Egyptians first developed a dental cream which contained powdered ashes from oxen hooves, myrrh, egg shells and pumice," Frank Lippert of the Indiana University School of Dentistry wrote in a 2003 monograph. "Persians then added burnt shells of snails and oysters along with gypsum, herbs and honey around 1,000 B.C."
        - paragraph [ref=e40]: People continued to whip up their own toothpaste and powders even after the advent of commercially produced versions centuries later. An 1860 book titled The Practical Housewife, for example, recommended a mixture of powdered orris-root, powdered charcoal, powdered Peruvian bark, prepared chalk, and oil of bergamot or lavender. A Connecticut dentist, Washington Wentworth Sheffield, is credited with the idea of packing toothpaste in a squeezable tube in the 1880s. Before then, the American Dental Association notes, it was commonly "sold in bottles, porcelain pots or paper boxes." That breakthrough, the ADA says, helped make it possible for toothpaste to be "mass-produced in factories, mass-marketed and sold nation-wide."
        - paragraph [ref=e41]: In 1955, Crest launched the first toothpaste to contain fluoride, which research had shown to be effective in reducing cavities. Drawn by the illustrator Norman Rockwell, early Crest ads featured grinning boys and girls showing off reports from their latest dentist visits, with the tagline "Look Mom—no cavities!" Today all toothpaste bearing the ADA's seal of acceptance must contain fluoride, and many municipalities add it to their drinking water.
        - paragraph [ref=e42]: "The humble toothpick may be the oldest of all dental implements, dating back more than a million years to prehistoric times, according to anthropologists. In that time, it has gone from an everyday object to a status symbol and back to an everyday object again. The earliest toothpicks were probably small slivers of wood, although bone, ivory, and other materials came into use at various points. Also popular: quills plucked from crows and geese."
        - paragraph [ref=e43]: During the Victorian era, toothpicks made of silver or gold became popular among people who could afford them. An ivory and gold toothpick once belonging to Charles Dickens, engraved with his initials, sold at auction in 2009 for $9,150. In fact, toothpicking at meals apparently became so prevalent in 19th-century society that etiquette books were compelled to address the topic. "It is very rude to pick your teeth at the table," one advised in 1882, helpfully adding, "If it becomes necessary to do so, hold your napkin over your mouth."
        - paragraph [ref=e44]: The toothpick began to return to its wooden roots in the 1860s when American entrepreneur Charles Forster figured out a way to mass-produce them. His Maine-based factory was soon turning out 500 million a year, and free toothpicks became ubiquitous restaurant giveaways.
