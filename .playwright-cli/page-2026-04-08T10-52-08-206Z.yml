            - generic [ref=f1e45]:
              - heading "Zoe Stephens" [level=2] [ref=f1e46]
              - paragraph [ref=f1e47]: I've been an actor for 30 years, working in TV, film and on stage. I've worked hard to get where I am, but I see young actors today who want success without proper training. Some become huge screen stars within two years, earning a lot of money and attention, but can they hold an audience? Natural talent without knowledge and technique isn't enough.
              - paragraph [ref=f1e48]: On my last job, the research and training was no more than a chat with the director over a meal the night before filming began. When I started, we did two scenes a day. Now we do six or seven. Modern screen actors are often treated like children – 'Put on these clothes, say your lines – we'll do all the rest.'
              - paragraph [ref=f1e49]: I've had to get used to people approaching me in the street, which I still find unexpected. I love it when people tell me a performance has helped them in some way – it's great to feel like I've done something useful. But I hate being photographed secretly and put in a magazine looking terrible – that's something I didn't have to worry about in the early days of my career.
