<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Innovative Centre Test Dashboard</title>
    <link rel="stylesheet" href="assets/css/dashboard.css">
    <link rel="icon" href="assets/icons/innovativecentre.png">
</head>
<body>
    <!-- Load distraction-free mode first -->
    <script src="assets/js/distraction-free.js"></script>
    <script src="assets/js/answer-manager.js"></script>
    
    <div class="dashboard-wrapper">
        <!-- Header Section -->
        <header class="dashboard-header">
            <div class="header-content">
                <img src="assets/icons/Logo Big.png" alt="Innovative Centre" class="header-logo">
                <div class="header-right">
                    <div class="test-info">
                        <span id="mockInfo" class="mock-badge">Mock Test: 1</span>
                    </div>
                    <a href="#" onclick="showInvigilatorLogin(); return false;" class="admin-link-header">Admin</a>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="dashboard-main">
            <div class="container">
                <!-- Welcome Section -->
                <div class="welcome-section">
                    <h1 id="welcomeText" class="welcome-title">Welcome, f a</h1>
                    <p id="studentDetails" class="student-id">ID: 21</p>
                </div>
                
                <!-- Modules Section -->
                <div class="modules-section">
                    <h2 class="section-title">Select a Module to Begin</h2>
                    <div class="modules-grid">
                        <!-- Listening Module -->
                        <div class="module-card" id="listeningCard" data-module="listening">
                            <h3 class="module-title">Listening</h3>
                            <p class="module-duration">~30 minutes</p>
                            <span class="status-badge" id="listeningStatus">In Progress</span>
                            <button class="module-button" id="listeningButton">Continue Listening</button>
                        </div>
                        
                        <!-- Reading Module -->
                        <div class="module-card" id="readingCard" data-module="reading">
                            <h3 class="module-title">Reading</h3>
                            <p class="module-duration">60 minutes</p>
                            <span class="status-badge" id="readingStatus">In Progress</span>
                            <button class="module-button" id="readingButton">Continue Reading</button>
                        </div>
                        
                        <!-- Writing Module -->
                        <div class="module-card" id="writingCard" data-module="writing">
                            <h3 class="module-title">Writing</h3>
                            <p class="module-duration">60 minutes</p>
                            <span class="status-badge" id="writingStatus">In Progress</span>
                            <button class="module-button" id="writingButton">Continue Writing</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Load student information and test state
        document.addEventListener('DOMContentLoaded', function() {
            loadStudentInfo();
            loadTestState();
            updateUI();
        });

        function loadStudentInfo() {
            const studentId = localStorage.getItem('studentId');
            const studentName = localStorage.getItem('studentName');
            const selectedMock = localStorage.getItem('selectedMock') || '1';
            
            if (!studentId || !studentName) {
                window.location.href = 'index.html';
                return;
            }
            
            document.getElementById('welcomeText').textContent = `Welcome, ${studentName}`;
            document.getElementById('studentDetails').textContent = `ID: ${studentId}`;
            document.getElementById('mockInfo').textContent = `Mock Test: ${selectedMock}`;
        }

        function loadTestState() {
            const modules = ['listening', 'reading', 'writing'];
            modules.forEach(module => {
                const status = localStorage.getItem(`${module}Status`) || 'not-started';
                const card = document.getElementById(`${module}Card`);
            const statusEl = document.getElementById(`${module}Status`);
                const button = document.getElementById(`${module}Button`);
                
                if (status === 'completed') {
                    card.classList.add('completed');
                    statusEl.textContent = 'Completed';
                    statusEl.className = 'status-badge completed';
                    button.textContent = 'Completed ✓';
                    button.disabled = true;
                } else if (status === 'in-progress') {
                    card.classList.add('in-progress');
                    statusEl.textContent = 'In Progress';
                    statusEl.className = 'status-badge in-progress';
                    button.textContent = `Continue ${module.charAt(0).toUpperCase() + module.slice(1)}`;
                } else {
                    statusEl.textContent = 'Not Started';
                    statusEl.className = 'status-badge not-started';
                    button.textContent = `Start ${module.charAt(0).toUpperCase() + module.slice(1)}`;
                }
            });
        }

        function updateUI() {
            const completed = ['listening', 'reading', 'writing'].filter(module => 
                localStorage.getItem(`${module}Status`) === 'completed'
            ).length;
        }

        // Module button handlers
        document.getElementById('listeningButton').addEventListener('click', function() {
            if (localStorage.getItem('listeningStatus') === 'completed') return;
            startModule('listening');
        });

        document.getElementById('readingButton').addEventListener('click', function() {
            if (localStorage.getItem('readingStatus') === 'completed') return;
            startModule('reading');
        });

        document.getElementById('writingButton').addEventListener('click', function() {
            if (localStorage.getItem('writingStatus') === 'completed') return;
            startModule('writing');
        });

        function startModule(module) {
            const selectedMock = localStorage.getItem('selectedMock') || '1';
            localStorage.setItem(`${module}Status`, 'in-progress');
            localStorage.setItem(`${module}StartTime`, new Date().toISOString());
            
            // Navigate to the module
            window.location.href = `MOCKs/MOCK ${selectedMock}/${module}.html`;
        }

        // Invigilator Access Functions
        function showInvigilatorLogin() {
            const modal = document.getElementById('invigilator-modal');
            modal.classList.remove('hidden');
            modal.style.display = 'flex';
            modal.style.alignItems = 'center';
            modal.style.justifyContent = 'center';
            document.getElementById('invigilator-password').focus();
        }

        function closeInvigilatorModal() {
            const modal = document.getElementById('invigilator-modal');
            modal.classList.add('hidden');
            modal.style.display = 'none';
            document.getElementById('invigilator-password').value = '';
            document.getElementById('password-error').style.display = 'none';
        }

        function verifyInvigilatorPassword() {
            const password = document.getElementById('invigilator-password').value;
            const correctPassword = 'InV!#2025$SecurePass'; // Strong password - change this for production
            
            if (password === correctPassword) {
                // Correct password - redirect to invigilator page
                window.location.href = 'invigilator.html';
            } else {
                // Wrong password
                document.getElementById('password-error').style.display = 'block';
                document.getElementById('invigilator-password').value = '';
                document.getElementById('invigilator-password').focus();
            }
        }

        // Allow Enter key to submit password
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && document.getElementById('invigilator-modal') && !document.getElementById('invigilator-modal').classList.contains('hidden')) {
                verifyInvigilatorPassword();
            }
        });
    </script>

    <!-- Invigilator Access Modal -->
    <div id="invigilator-modal" class="modal-overlay hidden" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000;">
        <div class="modal-content" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 0; border-radius: 8px; max-width: 400px; width: 90%;">
            <button class="modal-close-btn" onclick="closeInvigilatorModal()" style="position: absolute; top: 10px; right: 15px; background: none; border: none; font-size: 24px; cursor: pointer;">&times;</button>
            <h2 style="margin: 0; padding: 20px 20px 10px; font-size: 20px;">Invigilator Access</h2>
            <div style="padding: 20px;">
                <label for="invigilator-password" style="display: block; margin-bottom: 10px; font-weight: bold;">Enter Password:</label>
                <input type="password" id="invigilator-password" placeholder="Password" style="width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;">
                <button onclick="verifyInvigilatorPassword()" style="width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px;">Access Invigilator Page</button>
                <p id="password-error" style="color: red; margin-top: 10px; display: none;">Incorrect password. Please try again.</p>
            </div>
        </div>
    </div>

    <style>
        .modal-overlay.hidden {
            display: none !important;
        }
    </style>
</body>
</html>
