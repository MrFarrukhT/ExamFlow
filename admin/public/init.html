<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Initialize Database - Innovative Centre Admin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        .header {
            margin-bottom: 30px;
        }

        .header h1 {
            color: #2c3e50;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            color: #7f8c8d;
            font-size: 1.2em;
        }

        .steps {
            text-align: left;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
        }

        .steps h3 {
            color: #2c3e50;
            margin-bottom: 15px;
        }

        .steps ol {
            color: #555;
            line-height: 1.8;
        }

        .btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status.loading {
            background: #cce7ff;
            color: #004085;
            border: 1px solid #b3d9ff;
        }

        .details {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            text-align: left;
            font-family: monospace;
            font-size: 14px;
            max-height: 300px;
            overflow-y: auto;
        }

        .back-link {
            margin-top: 20px;
        }

        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .back-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🗄️ Database Setup</h1>
            <p>Initialize your Innovative Centre database</p>
        </div>

        <div class="steps">
            <h3>This will:</h3>
            <ol>
                <li>Test the database connection</li>
                <li>Create the <code>test_submissions</code> table</li>
                <li>Create the <code>admin_sessions</code> table</li>
                <li>Add sample data for testing</li>
                <li>Create database indexes for performance</li>
            </ol>
        </div>

        <div class="actions">
            <button class="btn" onclick="testConnection()" id="testBtn">🔍 Test Connection</button>
            <button class="btn" onclick="initializeDatabase()" id="initBtn">🚀 Initialize Database</button>
        </div>

        <div class="status" id="status"></div>

        <div class="back-link">
            <a href="/" onclick="goToAdmin()">← Back to Admin Panel</a>
        </div>
    </div>

    <script>
        async function testConnection() {
            const testBtn = document.getElementById('testBtn');
            const status = document.getElementById('status');

            testBtn.disabled = true;
            testBtn.textContent = '🔄 Testing...';

            showStatus('loading', '🔍 Testing database connection...');

            try {
                console.log('Making request to /api/test');
                const response = await fetch('/api/test');
                console.log('Response status:', response.status);

                const responseText = await response.text();
                console.log('Raw response:', responseText);

                let data;
                try {
                    data = JSON.parse(responseText);
                } catch (parseError) {
                    throw new Error(`Invalid JSON response: ${responseText.substring(0, 200)}...`);
                }

                if (data.success) {
                    showStatus('success', `✅ Database connection successful!

Connection Details:
• Database connected at: ${data.timestamp}
• Node.js version: ${data.environment.nodeVersion}
• Platform: ${data.environment.platform}`, data);
                } else {
                    showStatus('error', `❌ Database connection failed: ${data.message}`, data);
                }
            } catch (error) {
                showStatus('error', `❌ Connection test failed: ${error.message}`);
            } finally {
                testBtn.disabled = false;
                testBtn.textContent = '🔍 Test Connection';
            }
        }

        async function initializeDatabase() {
            const initBtn = document.getElementById('initBtn');
            const status = document.getElementById('status');

            if (!confirm('Are you sure you want to initialize the database? This will create tables and add sample data.')) {
                return;
            }

            initBtn.disabled = true;
            initBtn.textContent = '🔄 Initializing...';

            showStatus('loading', '🚀 Initializing database tables and data...');

            try {
                console.log('Making request to /api/init-database');
                const response = await fetch('/api/init-database', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                console.log('Response status:', response.status);
                console.log('Response headers:', response.headers);

                const responseText = await response.text();
                console.log('Raw response:', responseText);

                let data;
                try {
                    data = JSON.parse(responseText);
                } catch (parseError) {
                    throw new Error(`Invalid JSON response: ${responseText.substring(0, 200)}...`);
                }

                if (data.success) {
                    showStatus('success', `🎉 Database initialized successfully!

Initialization Results:
• Connection established at: ${data.details.connection_time}
• Tables created: ${data.details.tables_created.join(', ')}
• Total submissions: ${data.details.total_submissions}
• Sample data added: ${data.details.sample_data_added} records

Your database is ready! You can now:
1. Go to the admin panel and login with admin/admin123
2. Test your main application - submissions will save to database`, data);
                } else {
                    showStatus('error', `❌ Database initialization failed: ${data.message}`, data);
                }
            } catch (error) {
                showStatus('error', `❌ Initialization failed: ${error.message}`);
            } finally {
                initBtn.disabled = false;
                initBtn.textContent = '🚀 Initialize Database';
            }
        }

        function showStatus(type, message, details = null) {
            const status = document.getElementById('status');
            status.className = `status ${type}`;
            status.style.display = 'block';

            let html = `<div style="white-space: pre-line;">${message}</div>`;

            if (details) {
                html += `<div class="details">${JSON.stringify(details, null, 2)}</div>`;
            }

            status.innerHTML = html;
        }

        function goToAdmin() {
            window.location.href = '/';
        }

        // Auto-test connection when page loads
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(testConnection, 1000);
        });
    </script>
</body>
</html>
