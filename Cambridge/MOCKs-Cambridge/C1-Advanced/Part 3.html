<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>C1 Advanced - Reading Part 3</title>
  <link rel="stylesheet" href="./c1-test.css">
  <script src="../../../assets/js/cambridge/session-verify.js"></script>
</head>
<body>
  <div class="c1-header">
    <div class="part-label">Part 3 &middot; Word formation</div>
    <div class="part-info">Questions 17–24 &middot; Reading &amp; Use of English</div>
  </div>

  <div class="c1-shell">
    <div class="c1-instructions">
      For questions <strong>17–24</strong>, read the text below. Use the word given in capitals at the end of each line to form a word that fits in the gap in the same line.
    </div>

    <h2 class="c1-passage-title">Hundreds of people rush to view a special bird</h2>

    <div class="c1-passage" id="passage"></div>
  </div>

  <script src="./c1-test.js"></script>
  <script>
    const passageEl = document.getElementById('passage');

    function gapInput(num) {
      const wrap = document.createElement('span');
      wrap.appendChild(C1Test.renderTextInput(num, String(num)));
      return wrap;
    }
    function keyword(text) {
      const span = document.createElement('span');
      span.className = 'c1-keyword';
      span.textContent = text;
      return span;
    }

    function paragraph(parts) {
      const p = document.createElement('p');
      parts.forEach(part => {
        if (typeof part === 'string') {
          p.appendChild(document.createTextNode(part));
        } else if (part.gap) {
          p.appendChild(gapInput(part.gap));
        } else if (part.kw) {
          p.appendChild(keyword(part.kw));
        }
      });
      passageEl.appendChild(p);
    }

    paragraph(['Hundreds of birdwatchers recently rushed to a park in Washington DC, in the US, to catch a glimpse of a new arrival.']);

    paragraph([
      'Despite the ',
      { gap: 17 },
      ' low winter temperatures, people came out to see a Painted Bunting, a small, brightly coloured bird that usually spends the winter in the warmer climate of Florida. The bird was a male — highly distinctive with its brilliant blue head, red breast and flashes of green and red on its back.',
      { kw: 'COMMON' }
    ]);

    paragraph([
      'The bird\u2019s ',
      { gap: 18 }, { kw: 'PRESENT' },
      ' was announced on a birdwatchers\u2019 website and would have been ',
      { gap: 19 }, { kw: 'THINK' },
      ' just a few years ago. The ',
      { gap: 20 }, { kw: 'EXCEPT' },
      ' sighting can probably be attributed to the ',
      { gap: 21 }, { kw: 'DISRUPT' },
      ' that climate change is causing for hundreds of bird species.'
    ]);

    paragraph([
      { gap: 22 }, { kw: 'COUNT' },
      ' species all over the world are being pushed towards cooler areas as conditions heat up, or are losing suitable habitats altogether. Researchers warn that two thirds of North American bird species are now at risk of extinction. However, thanks to reports from community scientists all across the country, data about bird populations and their locations can be ',
      { gap: 23 }, { kw: 'VISUAL' },
      ' on maps in real time, and conservation efforts planned ',
      { gap: 24 }, { kw: 'ACCORD' },
      '.'
    ]);

    // Note: Parts 4–8 are not yet built; Part 3 is the last part for now
    // so students can submit. When more parts are added, set isLast: false
    // and update nextUrl to 'Part 4.html'.
    C1Test.buildNav({
      prevUrl: 'Part 2.html',
      nextUrl: null,
      isLast: true,
      progressText: 'Part 3 of 3 (more parts coming soon)'
    });
  </script>
</body>
</html>
