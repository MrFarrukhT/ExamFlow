<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cambridge A2 Key - Reading & Writing (Combined Parts 1-7)</title>
  <link rel="icon" href="../../assets/icons/innovativecentre.png">
  <link rel="stylesheet" href="../../assets/css/base.css">
  <!-- Prefetch other parts to reduce switch delay -->
  <link rel="prefetch" href="./Part 2.html" as="document">
  <link rel="prefetch" href="./Part 3.html" as="document">
  <link rel="prefetch" href="./Part 4.html" as="document">
  <link rel="prefetch" href="./Part 5.html" as="document">
  <link rel="prefetch" href="./Part 6.html" as="document">
  <link rel="prefetch" href="./Part 7.html" as="document">
  <style>
    body {
      margin: 0;
      background: #ffffff; /* Match Cambridge background */
      color: #000;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Helvetica Neue, Arial, "Apple Color Emoji", "Segoe UI Emoji";
    }
    .parts-container { padding: 0; }
    .frame-wrap {
      width: 100%;
      height: 100vh; /* occupy full viewport */
      background: #ffffff; /* avoid dark flash on switch */
    }
    .part-frame {
      width: 100%;
      height: 100%;
      border: 0;
      background: #ffffff;
      display: block;
    }
  </style>
  <script>
    window.__A2_ranges = null; // [{part,min,max}]

    function __A2_updateRangesFromFrameDoc(doc){
      try{
        var wrappers = doc.querySelectorAll('.footer__questionWrapper___1tZ46');
        var ranges = [];
        wrappers.forEach(function(w){
          var partEl = w.querySelector('.sectionNr');
          var part = partEl ? parseInt(partEl.textContent.trim(),10) : null;
          var qs = Array.from(w.querySelectorAll('.subQuestion.scorable-item'))
            .map(function(b){ return parseInt(b.getAttribute('data-ordernumber'),10); })
            .filter(function(n){ return !isNaN(n); });
          if(part && qs.length){
            var min = Math.min.apply(null, qs);
            var max = Math.max.apply(null, qs);
            ranges.push({part: part, min: min, max: max});
          }
        });
        if(ranges.length){ ranges.sort(function(a,b){ return a.part-b.part; }); window.__A2_ranges = ranges; }
      }catch(e){ /*noop*/ }
    }

    function __A2_getPartForQuestion(q){
      var rs = window.__A2_ranges || [];
      for(var i=0;i<rs.length;i++){ var r=rs[i]; if(q>=r.min && q<=r.max) return r.part; }
      return null;
    }

    function __A2_setPart(n) {
      var frame = document.getElementById('part-frame');
      if (!frame) return;
      try { sessionStorage.setItem('a2key-rw-active', String(n)); } catch (e) {}
      var src = './Part ' + n + '.html';
      frame.setAttribute('src', src);
    }

    function __A2_goToQuestion(qAbs){
      var part = __A2_getPartForQuestion(qAbs);
      if(part){
        try { sessionStorage.setItem('a2key-target-question', String(qAbs)); } catch(e) {}
        __A2_setPart(part);
      }
    }

    function __A2_bindCambridgeNav() {
      var frame = document.getElementById('part-frame');
      var doc = frame && frame.contentDocument;
      if (!doc) return;

      __A2_updateRangesFromFrameDoc(doc);

      function currentAbs(){
        var el = doc.querySelector('.footer__questionWrapper___1tZ46.selected .subQuestion.active.scorable-item') || doc.querySelector('.subQuestion.active.scorable-item');
        return el ? parseInt(el.getAttribute('data-ordernumber'),10) : null;
      }

      // Intercept subQuestion clicks (any part)
      var qBtns = doc.querySelectorAll('.subQuestion.scorable-item');
      qBtns.forEach(function(btn){
        if(btn.__icHook) return; btn.__icHook = true;
        btn.addEventListener('click', function(e){
          if(!e.isTrusted) return; // allow programmatic selects
          var n = parseInt(btn.getAttribute('data-ordernumber'),10);
          if(!isNaN(n) && window.parent && window.parent.__A2_goToQuestion){
            e.preventDefault(); e.stopPropagation(); if(e.stopImmediatePropagation) e.stopImmediatePropagation();
            window.parent.__A2_goToQuestion(n);
          }
        }, true);
      });

      // Intercept Prev/Next to become global question navigation
      var prev = doc.getElementById('footer-nav-button-previous');
      if (prev && !prev.__icHook) {
        prev.__icHook = true;
        prev.addEventListener('click', function(e){
          var c = currentAbs(); if(c==null) return;
          if (window.parent && window.parent.__A2_goToQuestion) {
            e.preventDefault(); e.stopPropagation(); if (e.stopImmediatePropagation) e.stopImmediatePropagation();
            window.parent.__A2_goToQuestion(c-1);
          }
        }, true);
      }
      var next = doc.getElementById('footer-nav-button-next');
      if (next && !next.__icHook) {
        next.__icHook = true;
        next.addEventListener('click', function(e){
          var c = currentAbs(); if(c==null) return;
          if (window.parent && window.parent.__A2_goToQuestion) {
            e.preventDefault(); e.stopPropagation(); if (e.stopImmediatePropagation) e.stopImmediatePropagation();
            window.parent.__A2_goToQuestion(c+1);
          }
        }, true);
      }

      // If parent requested a specific question, select it programmatically
      try{
        var tgt = sessionStorage.getItem('a2key-target-question');
        if(tgt){
          var b = doc.querySelector('.subQuestion.scorable-item[data-ordernumber="'+tgt+'"]');
          if(b){ b.click(); }
          sessionStorage.removeItem('a2key-target-question');
        }
      }catch(e){}
    }

    function initCombined() {
      var frame = document.getElementById('part-frame');
      var saved = parseInt((sessionStorage.getItem('a2key-rw-active') || '1'), 10);
      __A2_setPart(isNaN(saved) ? 1 : saved);
      frame.addEventListener('load', function(){ setTimeout(__A2_bindCambridgeNav, 25); });
    }
    window.addEventListener('DOMContentLoaded', initCombined);
  </script>
</head>
<body>
  <main class="parts-container">
    <div class="frame-wrap">
      <iframe id="part-frame" class="part-frame" title="A2 Key Part" src="./Part 1.html"></iframe>
    </div>
  </main>
</body>
</html>
