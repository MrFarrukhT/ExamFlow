<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cambridge A2 Key - Reading & Writing (Combined Parts 1-7)</title>
  <link rel="icon" href="../../assets/icons/innovativecentre.png">
  <link rel="stylesheet" href="../../assets/css/base.css">
  
  <!-- Centralized session verification -->
  <script src="../../../assets/js/cambridge/session-verify.js"></script>
  
  <!-- Prefetch other parts to reduce switch delay -->
  <link rel="prefetch" href="./Part 2.html" as="document">
  <link rel="prefetch" href="./Part 3.html" as="document">
  <link rel="prefetch" href="./Part 4.html" as="document">
  <link rel="prefetch" href="./Part 5.html" as="document">
  <link rel="prefetch" href="./Part 6.html" as="document">
  <link rel="prefetch" href="./Part 7.html" as="document">
  <style>
    body {
      margin: 0;
      background: #ffffff; /* Match Cambridge background */
      color: #000;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Helvetica Neue, Arial, "Apple Color Emoji", "Segoe UI Emoji";
    }
    .parts-container { padding: 0; }
    .frame-wrap {
      width: 100%;
      height: 100vh; /* occupy full viewport */
      background: #ffffff; /* avoid dark flash on switch */
    }
    .part-frame {
      width: 100%;
      height: 100%;
      border: 0;
      background: #ffffff;
      display: block;
    }
  </style>
  <!-- Shared helpers and wrapper controller -->
  <script src="../../../assets/js/cambridge/a2-key-shared.js"></script>
  <script src="../../../assets/js/cambridge/a2-key-wrapper.js"></script>
</head>
<body data-test-version="A2-Key" data-skill="reading-writing" data-mock="cambridge-a2-key">
  <main class="parts-container">
    <div class="frame-wrap">
      <iframe id="part-frame" class="part-frame" title="A2 Key Part" src="./Part 1.html"></iframe>
    </div>
  </main>

  <!-- Backend Integration Scripts -->
  <script src="../../../assets/js/universal-functions.js"></script>
  <script src="../../../assets/js/distraction-free.js"></script>
  <script src="../../../assets/js/cambridge/cambridge-answer-manager.js"></script>
  <script>
    // Mark module as in-progress and ensure storage exists
    document.addEventListener('DOMContentLoaded', function() {
      const currentModule = 'reading-writing';
      localStorage.setItem(`${currentModule}Status`, 'in-progress');
      if (!localStorage.getItem(`${currentModule}StartTime`)) {
        localStorage.setItem(`${currentModule}StartTime`, new Date().toISOString());
      }
      if (!localStorage.getItem('reading-writingAnswers')) {
        localStorage.setItem('reading-writingAnswers', JSON.stringify({}));
      }
    });
  </script>
</body>
</html>
