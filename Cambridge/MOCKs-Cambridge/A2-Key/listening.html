<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cambridge A2 Key - Listening</title>
  <link rel="icon" href="../../assets/icons/innovativecentre.png">
  
  <script src="../../../assets/js/cambridge/session-verify.js"></script>
  
  <style>
    body {
      margin: 0;
      background: #ffffff;
      color: #000;
      font-family: system-ui, -apple-system, sans-serif;
      overflow: hidden;
    }
    .part-frame {
      width: 100%;
      height: 100vh;
      border: 0;
      background: #ffffff;
      display: block;
    }
  </style>
</head>
<body>
  <iframe id="part-frame" class="part-frame" src="./Listening-Part-1.html" sandbox="allow-same-origin allow-scripts allow-forms allow-modals allow-top-navigation"></iframe>

  <script src="../../../assets/js/universal-functions.js"></script>
  <script src="../../../assets/js/distraction-free.js"></script>
  <script src="../../../assets/js/cambridge/cambridge-answer-manager.js"></script>
  <script src="../../../assets/js/cambridge/question-marking.js"></script>
  
  <script>
    // Initialize storage
    const module = 'listening';
    localStorage.setItem(`${module}Status`, 'in-progress');
    if (!localStorage.getItem(`${module}StartTime`)) {
      localStorage.setItem(`${module}StartTime`, new Date().toISOString());
      // Clear the listening test started flag for a fresh test
      localStorage.removeItem('listeningTestStarted');
    }
    if (!localStorage.getItem('listeningAnswers')) {
      localStorage.setItem('listeningAnswers', JSON.stringify({}));
    }
    
    // FIXED: Add message listener to allow iframe navigation from child frames
    window.addEventListener('message', function(event) {
      console.log('📨 Parent received message:', event.data);
      if (event.data && event.data.type === 'navigateTo') {
        const frame = document.getElementById('part-frame');
        if (frame && event.data.url) {
          console.log('🔄 Navigating to:', event.data.url);
          frame.src = event.data.url;
        }
      }
    });
  </script>
</body>
</html>
