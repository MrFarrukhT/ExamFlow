        #game-container {

        #lines-canvas {
            position: absolute;
            top: 0;
            left: 0;

            height: 100%;

            z-index: 10;

        .name-label {
            position: absolute;
            background: #fff;
            border: 2px solid #333;
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            font-size: 18px;
            transition: transform 0.2s, background 0.2s;
            z-index: 20;
            font-family: 'Comic Sans MS', 'Arial', sans-serif;
        }

        .name-label:hover {
            transform: scale(1.1);
            background: #e3f2fd;
        }

        .name-label.selected {
            background: #2196F3;
            color: white;
            border-color: #1565c0;
            box-shadow: 0 0 10px #2196F3;
        }

        .name-label.used {
            opacity: 0.6;
            background: #e0e0e0;
            border-color: #999;
        }
        
        .name-label.example-name {
            cursor: default;
            background: transparent;
            border: none;
            font-style: italic;
            color: #555;
        }
        .name-label.example-name:hover {
            transform: translateX(-50%); /* No scale on hover */
            background: transparent;
        }

        .hit-zone {
            position: absolute;
            border-radius: 50%;
            cursor: pointer;
            z-index: 15;
            transition: all 0.2s ease;
            /* Always visible */
            border: 3px solid rgba(255, 255, 255, 0.7); /* Thicker, visible border */
            background: rgba(255, 255, 255, 0.2); /* Semi-transparent fill */
            box-shadow: 0 0 8px rgba(0,0,0,0.3);
        }

        .hit-zone:hover {
            background: rgba(33, 150, 243, 0.4); /* Blue tint on hover */
            border-color: #2196F3;
            transform: scale(1.1);
        }
        
        /* Active/Selected state for line drawing */
        .hit-zone.active {
             border-color: #FF5722;
             background: rgba(255, 87, 34, 0.3);
        }

        #controls {
            margin-top: 80px; /* Increased to avoid overlap with bottom names */
            display: flex;
            gap: 20px;
            justify-content: center;
            z-index: 30;
        }

        .control-btn {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background: #ff5722;
            color: white;
            border: none;
            border-radius: 5px;
            font-family: inherit;
        }

        .control-btn:hover {
            background: #f4511e;
        }
    </style>

    <script>
        window.currentPart = 1;

        // --- Draw Lines Logic ---
        const names = [
            { id: 'n1', text: 'Peter', pos: 'top' },
            { id: 'n2', text: 'Mary', pos: 'top' },
            { id: 'n3', text: 'Eva', pos: 'top' },
            { id: 'n4', text: 'Mark', pos: 'top' },
            { id: 'n5', text: 'Sally', pos: 'bottom', isExample: true }, // Example: Non-selectable
            { id: 'n6', text: 'Daisy', pos: 'bottom' },
            { id: 'n7', text: 'Jack', pos: 'bottom' }
        ];

        // Placeholder Hit Zones (Adjusted to likely positions on people)
        const hitZones = [
            { id: 'p1', x: 28, y: 33, r: 8 }, // Left person (Red tracksuit?)
            { id: 'p2', x: 50, y: 25, r: 8 }, // Top Center (Girl?)
            { id: 'p3', x: 57, y: 18, r: 8 }, // Top Rightish (Man?) - Moved up to chest/head
            { id: 'p4', x: 70, y: 30, r: 8 }, // Far Right (Boy running?) - Moved left slightly
            // { id: 'p5', x: 43, y: 41, r: 8 }, // Center Girl (Blue shirt) - EXAMPLE (Sally)
            { id: 'p6', x: 60, y: 48, r: 8 }, // Center Boy (Red tracksuit) - Moved up to chest
            { id: 'p7', x: 35, y: 59, r: 8 }, // Bottom Left (Boy striped shirt)
            { id: 'p8', x: 74, y: 68, r: 8 }, // Bottom Right (Lady in white)
        ];

        let lines = []; 
        let selectedNameId = null;

        let mainArea, canvas, ctx, namesContainer, hitZonesContainer;

        function initGame() {
            mainArea = document.getElementById('main-area');
            canvas = document.getElementById('lines-canvas');
            ctx = canvas.getContext('2d');
            namesContainer = document.getElementById('names-container');
            hitZonesContainer = document.getElementById('hit-zones-container');

            resizeCanvas();
            renderNames();
            renderHitZones();
            loadSavedLines();
            drawLines();
            
            // Draw example line (Sally to Girl in Blue)
            // We can render a static example line or just leave it out if preferred.
            // The user asked to make Sally not selectable.
            
            window.addEventListener('resize', () => {
                resizeCanvas();
                drawLines();
            });
        }

        function resizeCanvas() {
            if(!mainArea || !canvas) return;
            canvas.width = mainArea.offsetWidth;
            canvas.height = mainArea.offsetHeight;
        }

        function renderNames() {
            if(!namesContainer) return;
            namesContainer.innerHTML = '';
            const width = mainArea.offsetWidth;
            const height = mainArea.offsetHeight;

            const topNames = names.filter(n => n.pos === 'top');
            const bottomNames = names.filter(n => n.pos === 'bottom');

            names.forEach((name) => {
                const el = document.createElement('div');
                el.className = 'name-label';
                el.textContent = name.text;
                el.dataset.id = name.id;
                
                let leftPos;
                let topPos;

                if (name.pos === 'top') {
                    const idx = topNames.findIndex(n => n.id === name.id);
                    leftPos = (width / (topNames.length + 1)) * (idx + 1);
                    topPos = -50; 
                } else {
                    const idx = bottomNames.findIndex(n => n.id === name.id);
                    leftPos = (width / (bottomNames.length + 1)) * (idx + 1);
                    topPos = height + 15;
                }

                el.style.left = `${leftPos}px`;
                el.style.top = `${topPos}px`;
                el.style.transform = 'translateX(-50%)';

                if (name.isExample) {
                    el.classList.add('example-name');
                    // Static example line drawing could go here if we had canvas coordinates ready
                } else {
                    el.addEventListener('click', () => selectName(name.id));
                }
                namesContainer.appendChild(el);
            });
        }

        function renderHitZones() {
            if(!hitZonesContainer) return;
            hitZonesContainer.innerHTML = '';
            hitZones.forEach(zone => {
                const el = document.createElement('div');
                el.className = 'hit-zone';
                el.dataset.id = zone.id;
                
                const xPx = (zone.x / 100) * mainArea.offsetWidth;
                const yPx = (zone.y / 100) * mainArea.offsetHeight;
                const rPx = 30; // Larger hit area for usability

                el.style.left = `${xPx - rPx}px`;
                el.style.top = `${yPx - rPx}px`;
                el.style.width = `${rPx * 2}px`;
                el.style.height = `${rPx * 2}px`;

                el.addEventListener('click', (e) => handleZoneClick(e, zone));
                hitZonesContainer.appendChild(el);
            });
        }

        function selectName(id) {
            if (selectedNameId === id) {
                selectedNameId = null;
            } else {
                selectedNameId = id;
            }
            updateNameStyles();
        }

        function handleZoneClick(e, zone) {
            if (!selectedNameId) return;

            // Remove existing line for this name if any
            lines = lines.filter(l => l.nameId !== selectedNameId);

            const nameEl = document.querySelector(`.name-label[data-id="${selectedNameId}"]`);
            if (nameEl) {
                const nameRect = nameEl.getBoundingClientRect();
                const mainRect = mainArea.getBoundingClientRect();

                const startX = (nameRect.left + nameRect.width / 2) - mainRect.left;
                const startY = (nameRect.top + nameRect.height / 2) - mainRect.top;

                const endX = (zone.x / 100) * mainArea.offsetWidth;
                const endY = (zone.y / 100) * mainArea.offsetHeight;

                lines.push({
                    nameId: selectedNameId,
                    zoneId: zone.id,
                    startX,
                    startY,
                    endX,
                    endY
                });

                saveLines();
                selectedNameId = null;
                updateNameStyles();
                drawLines();
            }
        }

        function drawLines() {
            if(!ctx || !canvas) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            lines.forEach(line => {
                ctx.beginPath();
                ctx.moveTo(line.startX, line.startY);
                ctx.lineTo(line.endX, line.endY);
                ctx.lineWidth = 3;
                ctx.strokeStyle = '#FF5722';
                ctx.lineCap = 'round';
                ctx.stroke();

                ctx.beginPath();
                ctx.arc(line.endX, line.endY, 5, 0, 2 * Math.PI);
                ctx.fillStyle = '#FF5722';
                ctx.fill();
            });
        }

        function updateNameStyles() {
            document.querySelectorAll('.name-label').forEach(el => {
                const id = el.dataset.id;
                el.classList.remove('selected', 'used');
                
                if (id === selectedNameId) {
                    el.classList.add('selected');
                }
                
                if (lines.some(l => l.nameId === id)) {
                    el.classList.add('used');
                }
            });
        }

        window.undoLastLine = function() {
            if (lines.length > 0) {
                lines.pop();
                saveLines();
                drawLines();
                updateNameStyles();
            }
        }

        window.clearAllLines = function() {
            if (confirm('Are you sure you want to clear all lines?')) {
                lines = [];
                saveLines();
                drawLines();
                updateNameStyles();
            }
        }

        function updateNavigationStatus() {
            // Clear all
            document.querySelectorAll('.subQuestion').forEach(btn => btn.classList.remove('answered'));
            
            // Light up 1 to lines.length
            const count = lines.length;
            for (let i = 1; i <= count; i++) {
                if (i > 5) break;
                const btn = document.querySelector(`.subQuestion[data-ordernumber="${i}"]`);
                if (btn) btn.classList.add('answered');
            }
        }

        function saveLines() {
            localStorage.setItem('movers_listening_part1', JSON.stringify(lines));
            
            // Map zones to question numbers and get name text
            // Note: p5 (Sally) is the example and commented out in hitZones
            // So we have p1, p2, p3, p4, p6, p7, p8 available
            const zoneToQuestion = {
                'p1': 'L1',
                'p2': 'L2',
                'p3': 'L3',
                'p4': 'L4',
                'p6': 'L5',  // p5 is the example (Sally), so p6 is question 5
                'p7': 'L6',  // Extended zones if needed
                'p8': 'L7'   // Extended zones if needed
            };
            
            // Get existing listening answers
            let allAnswers = JSON.parse(localStorage.getItem('cambridge-listeningAnswers') || '{}');
            
            // Clear previous Part 1 answers (L1-L7, in case all zones are used)
            ['L1', 'L2', 'L3', 'L4', 'L5', 'L6', 'L7'].forEach(key => delete allAnswers[key]);
            
            // Map each line to proper format: zoneId -> L1-L5, nameId -> actual name text
            lines.forEach(line => {
                const questionKey = zoneToQuestion[line.zoneId];
                if (questionKey) {
                    // Find the name text from the nameId
                    const nameData = names.find(n => n.id === line.nameId);
                    if (nameData) {
                        allAnswers[questionKey] = nameData.text;
                    }
                }
            });
            
            localStorage.setItem('cambridge-listeningAnswers', JSON.stringify(allAnswers));
            console.log('✅ Saved Part 1 listening answers:', allAnswers);
            updateNavigationStatus();
        }

        function loadSavedLines() {
            const saved = localStorage.getItem('movers_listening_part1');
            if (saved) {
                try {
                    lines = JSON.parse(saved);
                    updateNavigationStatus();
                    
                    // Need to re-calculate start/end positions based on current DOM size
                    const logicalLines = lines.map(l => ({ nameId: l.nameId, zoneId: l.zoneId }));
                    lines = []; 
                    
                    setTimeout(() => {
                         logicalLines.forEach(l => {
                            const nameEl = document.querySelector(`.name-label[data-id="${l.nameId}"]`);
                            const zone = hitZones.find(z => z.id === l.zoneId);
                            
                            if (nameEl && zone && mainArea) {
                                const nameRect = nameEl.getBoundingClientRect();
                                const mainRect = mainArea.getBoundingClientRect();
                                
                                const startX = (nameRect.left + nameRect.width / 2) - mainRect.left;
                                const startY = (nameRect.top + nameRect.height / 2) - mainRect.top;
                                
                                const endX = (zone.x / 100) * mainArea.offsetWidth;
                                const endY = (zone.y / 100) * mainArea.offsetHeight;
                                
                                lines.push({
                                    nameId: l.nameId,
                                    zoneId: l.zoneId,
                                    startX, startY, endX, endY
                                });
                            }
                        });
                        drawLines();
                        updateNameStyles();
                    }, 200);
                    
                } catch (e) {
                    console.error('Error loading lines', e);
                }
            }
        }

        // --- Standard Navigation & Init ---
        document.addEventListener('DOMContentLoaded', function() {
            
            // Init Game
            initGame();

            // Populate Candidate ID
            (function() {
                const studentId = localStorage.getItem('studentId');
                if (studentId) {
                    const headerNameDiv = document.querySelector('.header__name___1Cw2x');
                    if (headerNameDiv && headerNameDiv.textContent.includes('Candidate ID')) {
                        const headerValueDiv = headerNameDiv.nextElementSibling || document.createElement('div');
                        headerValueDiv.textContent = studentId;
                        headerValueDiv.style.fontWeight = 'bold';
                        if (!headerNameDiv.nextElementSibling) {
                            headerNameDiv.parentElement.appendChild(headerValueDiv);
                        }
                    }
                }
            })();

            const partFiles = {
                1: 'Listening-Part-1.html',
                2: 'Listening-Part-2.html',
                3: 'Listening-Part-3.html',
                4: 'Listening-Part-4.html',
                5: 'Listening-Part-5.html'
            };

            // Footer Navigation
            document.querySelectorAll('.footer__questionWrapper___1tZ46').forEach(function(wrapper) {
                const partButton = wrapper.querySelector('.footer__questionNo___3WNct');
                if (partButton) {
                    const partNumber = parseInt(partButton.querySelector('.sectionNr').textContent.trim());
                    partButton.addEventListener('click', function(e) {
                        e.preventDefault();
                        if (partFiles[partNumber]) {
                            if (window.self !== window.top) {
                                window.parent.postMessage({ type: 'navigate', url: partFiles[partNumber] }, '*');
                            } else {
                                window.location.href = partFiles[partNumber];
                            }
                        }
                    });
                }
            });

            const nextButton = document.getElementById('footer-nav-button-next');
            if (nextButton) {
                nextButton.addEventListener('click', function(e) {
                    e.preventDefault();
                    if (window.self !== window.top) {
                        window.parent.postMessage({ type: 'navigate', url: partFiles[2] }, '*');
                    } else {
                        window.location.href = partFiles[2];
                    }
                });
            }
            
            // Deliver Button
             document.getElementById('deliver-button').addEventListener('click', async function() {
                 if (confirm('Are you sure you want to submit your listening test?')) {
                     try {
                         if (window.cambridgeAnswerManager && typeof window.cambridgeAnswerManager.submitTestToDatabase === 'function') {
                             await window.cambridgeAnswerManager.submitTestToDatabase();
                         }
                     } catch (error) {
                         console.error('Error submitting to database:', error);
                     }
                     
                     localStorage.setItem('cambridge-listeningStatus', 'completed');
                     localStorage.setItem('cambridge-listeningEndTime', new Date().toISOString());
                     localStorage.removeItem('listeningTestStarted');
                     if (window.parent) {
                         try {
                             window.parent.postMessage({ type: 'listening-complete' }, '*');
                         } catch (postMessageError) {}
                     }
                     alert('Test submitted successfully!');
                     if (window.top && window.top !== window) {
                         window.top.location.href = '../../dashboard-cambridge.html';
                     } else {
                         window.location.href = '../../dashboard-cambridge.html';
                     }
                 }
             });
        });
    </script>
</body>
</html>
