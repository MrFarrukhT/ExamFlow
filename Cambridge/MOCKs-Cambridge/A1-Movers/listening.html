<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cambridge A2 Key - Listening</title>
  <link rel="icon" href="../../assets/icons/innovativecentre.png">
  
  <script src="../../../assets/js/cambridge/session-verify.js"></script>
  
  <style>
    body {
      margin: 0;
      background: #ffffff;
      color: #000;
      font-family: system-ui, -apple-system, sans-serif;
      overflow: hidden;
    }
    .part-frame {
      width: 100%;
      height: 100vh;
      border: 0;
      background: #ffffff;
      display: block;
    }
  </style>
</head>
<body>
  <iframe id="part-frame" class="part-frame" src="./Listening-Part-1.html" sandbox="allow-same-origin allow-scripts allow-forms allow-modals allow-top-navigation allow-popups"></iframe>

  <script src="../../../assets/js/universal-functions.js"></script>
  <script src="../../../assets/js/distraction-free.js"></script>
  <script src="../../../assets/js/cambridge/cambridge-answer-manager.js"></script>
  <script src="../../../assets/js/cambridge/cambridge-timer.js"></script>
  
  <script>
    // FIXED: Add message listener to allow iframe navigation from child frames
    window.addEventListener('message', function(e) {
      if (e.data && e.data.type === 'navigate') {
        console.log('📡 Navigation message received:', e.data.url);
        document.getElementById('part-frame').src = e.data.url;
      }
    });
    
    // Destroy any existing timers from other tests
    CambridgeTimer.destroyAllTimers();
    
    // Initialize storage
    const module = 'listening';
    const moduleStatus = localStorage.getItem(`${module}Status`);
    
    // Check if test is already completed - redirect to dashboard
    if (moduleStatus === 'completed') {
      alert('This test has already been completed. Returning to dashboard.');
      window.location.href = '../../dashboard-cambridge.html';
      throw new Error('Test already completed'); // Stop execution
    }
    
    const isNewTest = !localStorage.getItem(`${module}StartTime`) || moduleStatus !== 'in-progress';
    
    if (isNewTest) {
      // Starting fresh test - clear everything
      CambridgeTimer.clearTimerState(module);
      localStorage.removeItem(`${module}StartTime`);
      localStorage.removeItem(`${module}EndTime`);
      localStorage.removeItem('listeningTestStarted');
      // Set new start time
      localStorage.setItem(`${module}StartTime`, new Date().toISOString());
    }
    
    localStorage.setItem(`${module}Status`, 'in-progress');
    
    if (!localStorage.getItem('listeningAnswers')) {
      localStorage.setItem('listeningAnswers', JSON.stringify({}));
    }

    // Initialize timer
    const level = localStorage.getItem('cambridgeLevel') || 'A1-Movers';
    const timerDuration = CambridgeTimer.getTimerDuration(level, module);
    const timer = new CambridgeTimer(timerDuration, 'Listening');
  </script>
</body>
</html>
