    <script>
        window.currentPart = 2;

        // Question mapping: Part 2 typically corresponds to questions 6-10 in standard storage
        // But in this file UI it is 1-5 relative to part. 
        // Cambridge A1 Movers usually runs Part 1 (Q1-5), Part 2 (Q1-5? No, continues numbering).
        // Standard Movers: Part 1 (1-5), Part 2 (6-10), Part 3 (11-15), Part 4 (16-20), Part 5 (21-25).
        // So we should use offset +5.
        
        function saveAnswer(questionNum, answer) {
            let answers = JSON.parse(localStorage.getItem('cambridge-listeningAnswers') || '{}');
            answers[`L${questionNum}`] = answer;
            localStorage.setItem('cambridge-listeningAnswers', JSON.stringify(answers));
            
            const btn = document.querySelector(`[data-ordernumber="${questionNum}"]`);
            if (btn) {
                if(answer.trim()) btn.classList.add('answered');
                else btn.classList.remove('answered');
            }
        }

        function loadSavedAnswers() {
            const answers = JSON.parse(localStorage.getItem('cambridge-listeningAnswers') || '{}');
            for (let i = 6; i <= 10; i++) {
                const answer = answers[`L${i}`];
                if (answer) {
                    const input = document.getElementById(`q${i}`);
                    if (input) input.value = answer;
                    
                    const btn = document.querySelector(`[data-ordernumber="${i}"]`);
                    if (btn) btn.classList.add('answered');
                }
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            loadSavedAnswers();
            
            // Populate Candidate ID
            (function() {
                const studentId = localStorage.getItem('studentId');
                if (studentId) {
                    const headerNameDiv = document.querySelector('.header__name___1Cw2x');
                    if (headerNameDiv && headerNameDiv.textContent.includes('Candidate ID')) {
                        const headerValueDiv = headerNameDiv.nextElementSibling || document.createElement('div');
                        headerValueDiv.textContent = studentId;
                        headerValueDiv.style.fontWeight = 'bold';
                        if (!headerNameDiv.nextElementSibling) {
                            headerNameDiv.parentElement.appendChild(headerValueDiv);
                        }
                    }
                }
            })();

            const partFiles = {
                1: 'Listening-Part-1.html',
                2: 'Listening-Part-2.html',
                3: 'Listening-Part-3.html',
                4: 'Listening-Part-4.html',
                5: 'Listening-Part-5.html'
            };

            document.querySelectorAll('.footer__questionWrapper___1tZ46').forEach(function(wrapper) {
                const partButton = wrapper.querySelector('.footer__questionNo___3WNct');
                if (partButton) {
                    const partNumber = parseInt(partButton.querySelector('.sectionNr').textContent.trim());
                    partButton.addEventListener('click', function(e) {
                        e.preventDefault();
                        if (partFiles[partNumber]) {
                            if (window.self !== window.top) {
                                window.parent.postMessage({ type: 'navigate', url: partFiles[partNumber] }, '*');
                            } else {
                                window.location.href = partFiles[partNumber];
                            }
                        }
                    });
                }
            });

            const prevButton = document.getElementById('footer-nav-button-previous');
            if (prevButton) {
                prevButton.addEventListener('click', function(e) {
                    e.preventDefault();
                    if (window.self !== window.top) {
                        window.parent.postMessage({ type: 'navigate', url: partFiles[1] }, '*');
                    } else {
                        window.location.href = partFiles[1];
                    }
                });
            }

            const nextButton = document.getElementById('footer-nav-button-next');
            if (nextButton) {
                nextButton.addEventListener('click', function(e) {
                    e.preventDefault();
                    if (window.self !== window.top) {
                        window.parent.postMessage({ type: 'navigate', url: partFiles[3] }, '*');
                    } else {
                        window.location.href = partFiles[3];
                    }
                });
            }
            
            // Deliver Button Logic
             document.getElementById('deliver-button').addEventListener('click', async function() {
                 if (confirm('Are you sure you want to submit your listening test?')) {
                     try {
                         if (window.cambridgeAnswerManager && typeof window.cambridgeAnswerManager.submitTestToDatabase === 'function') {
                             await window.cambridgeAnswerManager.submitTestToDatabase();
                         }
                     } catch (error) { console.error(error); }
                     
                     localStorage.setItem('cambridge-listeningStatus', 'completed');
                     localStorage.setItem('cambridge-listeningEndTime', new Date().toISOString());
                     localStorage.removeItem('listeningTestStarted');
                     if (window.parent) {
                         try { window.parent.postMessage({ type: 'listening-complete' }, '*'); } catch (e) {}
                     }
                     alert('Test submitted successfully!');
                     if (window.top && window.top !== window) {
                         window.top.location.href = '../../dashboard-cambridge.html';
                     } else {
                         window.location.href = '../../dashboard-cambridge.html';
                     }
                 }
             });
        });
    </script>
