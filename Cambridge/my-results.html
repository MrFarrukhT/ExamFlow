<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Answers &amp; Results - Cambridge</title>
    <link rel="stylesheet" href="../assets/css/cambridge-dashboard.css">
    <link rel="icon" href="../assets/icons/innovativecentre.png">
    <style>
        /* Results page styles */
        .results-section {
            background: #ffffff;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 1.5rem;
            animation: fadeSlideUp 0.5s ease-out both;
        }

        .results-section:nth-child(2) { animation-delay: 0.1s; }
        .results-section:nth-child(3) { animation-delay: 0.2s; }
        .results-section:nth-child(4) { animation-delay: 0.3s; }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid #e0f2f1;
        }

        .section-header h2 {
            font-size: 1.35rem;
            font-weight: 600;
            color: #2c3e50;
            margin: 0;
        }

        .score-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1.25rem;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .score-badge.scored {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .score-badge.pending {
            background: #fff3e0;
            color: #e65100;
        }

        .score-badge.not-submitted {
            background: #f5f5f5;
            color: #9e9e9e;
        }

        /* Answer grid */
        .answers-grid {
            display: grid;
            gap: 0.75rem;
        }

        .answer-row {
            display: grid;
            grid-template-columns: 50px 1fr 1fr 40px;
            align-items: center;
            padding: 0.75rem 1rem;
            border-radius: 6px;
            background: #fafafa;
            gap: 1rem;
            font-size: 0.95rem;
        }

        .answer-row.correct {
            background: #e8f5e9;
        }

        .answer-row.incorrect {
            background: #fce4ec;
        }

        .answer-row.no-key {
            background: #f5f5f5;
        }

        .answer-row .q-number {
            font-weight: 700;
            color: #0d9488;
            font-size: 0.9rem;
        }

        .answer-row .student-answer {
            font-weight: 500;
            color: #333;
        }

        .answer-row .correct-answer {
            color: #666;
            font-size: 0.9rem;
        }

        .answer-row .result-icon {
            font-size: 1.1rem;
            text-align: center;
        }

        .answer-row .result-icon.check { color: #2e7d32; }
        .answer-row .result-icon.cross { color: #c62828; }
        .answer-row .result-icon.dash { color: #bdbdbd; }

        /* Part separator */
        .part-header {
            font-weight: 600;
            color: #0d9488;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 0.5rem 1rem;
            margin-top: 0.5rem;
            background: #e0f2f1;
            border-radius: 4px;
        }

        /* Summary stats */
        .results-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .summary-card {
            background: #f8fbff;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 1.25rem;
            text-align: center;
        }

        .summary-card.highlight {
            border-color: #0d9488;
            background: #e0f2f1;
        }

        .summary-value {
            font-size: 1.75rem;
            font-weight: 700;
            color: #0d9488;
            margin-bottom: 0.25rem;
        }

        .summary-label {
            font-size: 0.8rem;
            color: #757575;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        /* Speaking status */
        .speaking-info {
            padding: 1.5rem;
            border-radius: 8px;
            text-align: center;
        }

        .speaking-info.submitted {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .speaking-info.evaluated {
            background: #e3f2fd;
            color: #1565c0;
        }

        .speaking-info.not-submitted {
            background: #f5f5f5;
            color: #9e9e9e;
        }

        .speaking-info p {
            margin: 0.5rem 0;
            font-size: 0.95rem;
        }

        .speaking-info .eval-notes {
            margin-top: 1rem;
            padding: 1rem;
            background: rgba(255,255,255,0.5);
            border-radius: 6px;
            text-align: left;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        /* Loading & empty states */
        .loading-state, .empty-state {
            text-align: center;
            padding: 3rem 2rem;
            color: #757575;
        }

        .loading-state .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e0e0e0;
            border-top-color: #0d9488;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state p {
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }

        /* Back button */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: white;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: opacity 0.3s;
        }

        .back-btn:hover {
            opacity: 0.8;
        }

        /* Answer columns header */
        .answers-header {
            display: grid;
            grid-template-columns: 50px 1fr 1fr 40px;
            gap: 1rem;
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
            font-weight: 600;
            color: #757575;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .answer-row {
                grid-template-columns: 40px 1fr 1fr 32px;
                padding: 0.6rem 0.75rem;
                gap: 0.5rem;
                font-size: 0.85rem;
            }
            .answers-header {
                grid-template-columns: 40px 1fr 1fr 32px;
                gap: 0.5rem;
                font-size: 0.75rem;
            }
            .results-summary {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 480px) {
            .answer-row {
                grid-template-columns: 36px 1fr 36px;
                font-size: 0.85rem;
            }
            .answer-row .correct-answer {
                display: none;
            }
            .answers-header {
                grid-template-columns: 36px 1fr 36px;
            }
            .answers-header .col-correct {
                display: none;
            }
        }

        /* Error banner */
        .error-banner {
            background: #fce4ec;
            color: #c62828;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
        }

        .error-banner a {
            color: #c62828;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="dashboard-wrapper">
        <header class="dashboard-header">
            <div class="header-content">
                <img src="../assets/icons/Logo Big.png" alt="Innovative Centre" class="header-logo">
                <div class="exam-badge-header">Cambridge General English</div>
                <div class="header-right">
                    <div class="test-info">
                        <span id="levelInfo" class="level-badge">Results</span>
                    </div>
                    <a href="dashboard-cambridge.html" class="back-btn">&#8592; Back to Dashboard</a>
                </div>
            </div>
        </header>

        <main class="dashboard-main">
            <div class="container">
                <div class="welcome-section">
                    <h1 id="welcomeText" class="welcome-title">My Answers & Results</h1>
                    <p id="studentDetails" class="student-id"></p>
                </div>

                <div id="loadingState" class="loading-state">
                    <div class="spinner"></div>
                    <p>Loading your answers...</p>
                </div>

                <div id="errorState" class="error-banner" style="display:none;"></div>

                <div id="resultsContent" style="display:none;">
                    <!-- Summary cards -->
                    <div class="results-summary" id="summaryCards"></div>

                    <!-- Reading & Writing combined section (A1/A2) -->
                    <div class="results-section" id="rwSection" style="display:none;">
                        <div class="section-header">
                            <h2>Reading & Writing</h2>
                            <span class="score-badge" id="rwScore"></span>
                        </div>
                        <div class="answers-header">
                            <span>Q#</span>
                            <span>Your Answer</span>
                            <span class="col-correct">Correct Answer</span>
                            <span></span>
                        </div>
                        <div class="answers-grid" id="rwAnswers"></div>
                    </div>

                    <!-- Reading section (B1/B2) -->
                    <div class="results-section" id="readingSection" style="display:none;">
                        <div class="section-header">
                            <h2>Reading</h2>
                            <span class="score-badge" id="readingScore"></span>
                        </div>
                        <div class="answers-header">
                            <span>Q#</span>
                            <span>Your Answer</span>
                            <span class="col-correct">Correct Answer</span>
                            <span></span>
                        </div>
                        <div class="answers-grid" id="readingAnswers"></div>
                    </div>

                    <!-- Writing section (B1/B2) -->
                    <div class="results-section" id="writingSection" style="display:none;">
                        <div class="section-header">
                            <h2>Writing</h2>
                            <span class="score-badge" id="writingScore"></span>
                        </div>
                        <div class="answers-header">
                            <span>Q#</span>
                            <span>Your Answer</span>
                            <span class="col-correct">Correct Answer</span>
                            <span></span>
                        </div>
                        <div class="answers-grid" id="writingAnswers"></div>
                    </div>

                    <!-- Listening section -->
                    <div class="results-section" id="listeningSection" style="display:none;">
                        <div class="section-header">
                            <h2>Listening</h2>
                            <span class="score-badge" id="listeningScore"></span>
                        </div>
                        <div class="answers-header">
                            <span>Q#</span>
                            <span>Your Answer</span>
                            <span class="col-correct">Correct Answer</span>
                            <span></span>
                        </div>
                        <div class="answers-grid" id="listeningAnswers"></div>
                    </div>

                    <!-- Speaking section -->
                    <div class="results-section" id="speakingSection" style="display:none;">
                        <div class="section-header">
                            <h2>Speaking</h2>
                            <span class="score-badge" id="speakingScore"></span>
                        </div>
                        <div id="speakingContent"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const MOVERS_STRUCTURE = { 1: 5, 2: 6, 3: 6, 4: 5, 5: 7, 6: 6 };
        const API_BASE = 'http://localhost:3003';

        let studentId, studentName, level, mockTest;

        document.addEventListener('DOMContentLoaded', init);

        function init() {
            studentId = localStorage.getItem('studentId');
            studentName = localStorage.getItem('studentName');
            level = localStorage.getItem('cambridgeLevel');
            mockTest = localStorage.getItem('selectedCambridgeMock') || '1';

            if (!studentId || !studentName) {
                window.location.href = '../index.html?exam=cambridge';
                return;
            }

            document.getElementById('welcomeText').textContent = `${studentName}'s Answers & Results`;
            document.getElementById('studentDetails').textContent = `ID: ${studentId} \u2022 Level: ${(level || '').replace('-', ' ')}`;
            document.getElementById('levelInfo').textContent = (level || '').replace('-', ' ');

            loadResults();
        }

        async function loadResults() {
            try {
                // Fetch submissions and answer keys in parallel — each wrapped so one failure doesn't kill the rest
                const [submissions, rwKeys, listenKeys] = await Promise.all([
                    fetchJSON(`${API_BASE}/cambridge-submissions?student_id=${encodeURIComponent(studentId)}&level=${encodeURIComponent(level)}&mock_test=${encodeURIComponent(mockTest)}`).catch(() => []),
                    fetchJSON(`${API_BASE}/cambridge-answers?level=${encodeURIComponent(level)}&skill=reading-writing&mock=${encodeURIComponent(mockTest)}`).catch(() => ({ success: false })),
                    fetchJSON(`${API_BASE}/cambridge-answers?level=${encodeURIComponent(level)}&skill=listening&mock=${encodeURIComponent(mockTest)}`).catch(() => ({ success: false }))
                ]);

                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('resultsContent').style.display = 'block';

                // Parse submissions by skill
                const bySkill = {};
                const subArray = Array.isArray(submissions) ? submissions : [];
                subArray.forEach(s => {
                    if (!bySkill[s.skill] || new Date(s.created_at) > new Date(bySkill[s.skill].created_at)) {
                        bySkill[s.skill] = s;
                    }
                });

                const rwSub = bySkill['reading-writing'];
                const listenSub = bySkill['listening'];
                const speakSub = bySkill['speaking'];

                // If nothing submitted at all, check localStorage fallback
                const rwAnswersLocal = tryParseJSON(localStorage.getItem('cambridge-reading-writingAnswers'));
                const listenAnswersLocal = tryParseJSON(localStorage.getItem('cambridge-listeningAnswers'));

                const rwAnswers = (rwSub && rwSub.answers) || rwAnswersLocal || null;
                const listenAnswers = (listenSub && listenSub.answers) || listenAnswersLocal || null;

                const rwKeyMap = (rwKeys && rwKeys.success) ? rwKeys.answers : {};
                const listenKeyMap = (listenKeys && listenKeys.success) ? listenKeys.answers : {};

                // Build summary
                buildSummary(rwSub, listenSub, speakSub, rwAnswers, listenAnswers, rwKeyMap, listenKeyMap);

                // Render each section
                if (rwAnswers && Object.keys(rwAnswers).length > 0) {
                    renderAnswerSection('rw', rwAnswers, rwKeyMap, rwSub, level);
                }

                if (listenAnswers && Object.keys(listenAnswers).length > 0) {
                    renderAnswerSection('listening', listenAnswers, listenKeyMap, listenSub, level);
                }

                renderSpeakingSection(speakSub);

                // If nothing at all
                if (!rwAnswers && !listenAnswers && !speakSub) {
                    document.getElementById('resultsContent').innerHTML = `
                        <div class="empty-state">
                            <p>No answers found yet.</p>
                            <p style="font-size:0.9rem; color:#999;">Complete your test modules first, then come back here to review your answers.</p>
                            <a href="dashboard-cambridge.html" class="module-button" style="display:inline-block; margin-top:1.5rem; max-width:260px; text-align:center; text-decoration:none;">Go to Dashboard</a>
                        </div>`;
                }

            } catch (err) {
                console.error('Failed to load results:', err);
                document.getElementById('loadingState').style.display = 'none';

                // Fallback: show localStorage answers even if server is down
                const rwLocal = tryParseJSON(localStorage.getItem('cambridge-reading-writingAnswers'));
                const listenLocal = tryParseJSON(localStorage.getItem('cambridge-listeningAnswers'));

                if (rwLocal || listenLocal) {
                    document.getElementById('errorState').style.display = 'block';
                    document.getElementById('errorState').textContent = 'Could not reach the server. Showing your locally saved answers (scores unavailable).';
                    document.getElementById('resultsContent').style.display = 'block';

                    if (rwLocal && Object.keys(rwLocal).length > 0) {
                        renderAnswerSection('rw', rwLocal, {}, null, level);
                    }
                    if (listenLocal && Object.keys(listenLocal).length > 0) {
                        renderAnswerSection('listening', listenLocal, {}, null, level);
                    }
                    buildSummary(null, null, null, rwLocal, listenLocal, {}, {});
                } else {
                    document.getElementById('errorState').style.display = 'block';
                    document.getElementById('errorState').innerHTML = 'Could not load your results. Please check that the server is running and <a href="dashboard-cambridge.html">try again</a>.';
                }
            }
        }

        function buildSummary(rwSub, listenSub, speakSub, rwAnswers, listenAnswers, rwKeys, listenKeys) {
            const cards = document.getElementById('summaryCards');
            cards.innerHTML = '';

            // Count answered
            const rwCount = rwAnswers ? Object.keys(rwAnswers).length : 0;
            const listenCount = listenAnswers ? Object.keys(listenAnswers).length : 0;

            // Count correct (only if keys exist)
            let rwCorrect = 0, listenCorrect = 0;
            let hasRwKeys = rwKeys && Object.keys(rwKeys).length > 0;
            let hasListenKeys = listenKeys && Object.keys(listenKeys).length > 0;

            if (hasRwKeys && rwAnswers) {
                for (const [k, v] of Object.entries(rwAnswers)) {
                    if (isCorrect(v, rwKeys[k])) rwCorrect++;
                }
            }
            if (hasListenKeys && listenAnswers) {
                for (const [k, v] of Object.entries(listenAnswers)) {
                    if (isCorrect(v, listenKeys[k])) listenCorrect++;
                }
            }

            const totalAnswered = rwCount + listenCount;
            const totalCorrect = rwCorrect + listenCorrect;
            const hasAnyKeys = hasRwKeys || hasListenKeys;
            const totalKeyQuestions = (hasRwKeys ? Object.keys(rwKeys).length : 0) + (hasListenKeys ? Object.keys(listenKeys).length : 0);

            addSummaryCard(cards, totalAnswered, 'Questions Answered', false);

            if (hasAnyKeys) {
                addSummaryCard(cards, totalCorrect + ' / ' + totalKeyQuestions, 'Correct Answers', true);
                const pct = totalKeyQuestions > 0 ? Math.round((totalCorrect / totalKeyQuestions) * 100) : 0;
                addSummaryCard(cards, pct + '%', 'Score', true);
            }

            // Module count
            let submittedModules = 0;
            if (rwSub) submittedModules++;
            if (listenSub) submittedModules++;
            if (speakSub) submittedModules++;
            addSummaryCard(cards, submittedModules + ' / 3', 'Modules Submitted', false);
        }

        function addSummaryCard(container, value, label, highlight) {
            const card = document.createElement('div');
            card.className = 'summary-card' + (highlight ? ' highlight' : '');
            card.innerHTML = `<div class="summary-value">${value}</div><div class="summary-label">${label}</div>`;
            container.appendChild(card);
        }

        function renderAnswerSection(sectionId, answers, answerKeys, submission, lvl) {
            const section = document.getElementById(sectionId + 'Section');
            const grid = document.getElementById(sectionId + 'Answers');
            const scoreBadge = document.getElementById(sectionId + 'Score');
            section.style.display = 'block';
            grid.innerHTML = '';

            // Score badge
            if (submission && submission.score !== null && submission.score !== undefined) {
                scoreBadge.className = 'score-badge scored';
                scoreBadge.textContent = 'Score: ' + submission.score + (submission.grade ? ' (' + submission.grade + ')' : '');
            } else if (submission) {
                scoreBadge.className = 'score-badge pending';
                scoreBadge.textContent = 'Pending Review';
            } else {
                scoreBadge.className = 'score-badge not-submitted';
                scoreBadge.textContent = 'Not Submitted';
            }

            const hasKeys = answerKeys && Object.keys(answerKeys).length > 0;

            // For A1-Movers reading-writing, show part headers
            const isRW = sectionId === 'rw';
            const isMoversRW = isRW && lvl === 'A1-Movers';

            // Sort answer keys numerically
            const sortedKeys = Object.keys(answers).sort((a, b) => {
                const numA = parseInt(a.replace(/\D/g, ''));
                const numB = parseInt(b.replace(/\D/g, ''));
                return numA - numB;
            });

            let currentPart = 0;
            let questionInPart = 0;

            sortedKeys.forEach((key, idx) => {
                const qNum = parseInt(key.replace(/\D/g, '')) || (idx + 1);

                // Part headers for A1 Movers R&W
                if (isMoversRW) {
                    const partInfo = getMoversPartForQuestion(qNum);
                    if (partInfo.part !== currentPart) {
                        currentPart = partInfo.part;
                        questionInPart = 0;
                        const partEl = document.createElement('div');
                        partEl.className = 'part-header';
                        partEl.textContent = 'Part ' + currentPart;
                        grid.appendChild(partEl);
                    }
                }

                const studentAnswer = answers[key] || '';
                const correctAnswer = hasKeys ? (answerKeys[key] || '') : '';
                const correct = hasKeys && correctAnswer ? isCorrect(studentAnswer, correctAnswer) : null;

                const row = document.createElement('div');
                row.className = 'answer-row' + (correct === true ? ' correct' : correct === false ? ' incorrect' : ' no-key');

                row.innerHTML = `
                    <span class="q-number">Q${qNum}</span>
                    <span class="student-answer">${escapeHtml(studentAnswer) || '<em style="color:#bbb">No answer</em>'}</span>
                    <span class="correct-answer">${hasKeys ? (escapeHtml(correctAnswer) || '\u2014') : '<em style="color:#bbb">No answer key</em>'}</span>
                    <span class="result-icon ${correct === true ? 'check' : correct === false ? 'cross' : 'dash'}">${correct === true ? '\u2713' : correct === false ? '\u2717' : '\u2014'}</span>
                `;

                grid.appendChild(row);
            });
        }

        function renderSpeakingSection(submission) {
            const section = document.getElementById('speakingSection');
            const content = document.getElementById('speakingContent');
            const scoreBadge = document.getElementById('speakingScore');

            const speakingStatus = localStorage.getItem('cambridge-speakingStatus');

            if (!submission && speakingStatus !== 'completed') {
                // Not submitted at all
                section.style.display = 'block';
                scoreBadge.className = 'score-badge not-submitted';
                scoreBadge.textContent = 'Not Started';
                content.innerHTML = `<div class="speaking-info not-submitted"><p>You haven't taken the speaking test yet.</p></div>`;
                return;
            }

            section.style.display = 'block';

            if (submission && submission.evaluated) {
                scoreBadge.className = 'score-badge scored';
                scoreBadge.textContent = 'Score: ' + (submission.score || 'N/A') + (submission.grade ? ' (' + submission.grade + ')' : '');
                content.innerHTML = `
                    <div class="speaking-info evaluated">
                        <p><strong>Your speaking test has been evaluated.</strong></p>
                        ${submission.evaluator_name ? '<p>Evaluated by: ' + escapeHtml(submission.evaluator_name) + '</p>' : ''}
                        ${submission.evaluation_notes ? '<div class="eval-notes"><strong>Feedback:</strong><br>' + escapeHtml(submission.evaluation_notes) + '</div>' : ''}
                    </div>`;
            } else {
                scoreBadge.className = 'score-badge pending';
                scoreBadge.textContent = 'Pending Evaluation';
                content.innerHTML = `
                    <div class="speaking-info submitted">
                        <p><strong>Your recording has been submitted.</strong></p>
                        <p>An invigilator will evaluate your speaking test. Check back later for your score and feedback.</p>
                        ${submission && submission.audio_duration ? '<p style="font-size:0.85rem; color:#4caf50;">Recording duration: ' + Math.round(submission.audio_duration / 60) + ' min ' + (submission.audio_duration % 60) + ' sec</p>' : ''}
                    </div>`;
            }
        }

        // Helpers
        function getMoversPartForQuestion(qNum) {
            let cumulative = 0;
            for (const [part, count] of Object.entries(MOVERS_STRUCTURE)) {
                cumulative += count;
                if (qNum <= cumulative) {
                    return { part: parseInt(part), questionInPart: qNum - (cumulative - count) };
                }
            }
            return { part: 6, questionInPart: qNum };
        }

        function isCorrect(studentAnswer, correctAnswer) {
            if (!correctAnswer) return null;
            const normalize = (s) => String(s || '').trim().toLowerCase().replace(/[.,;:!?'"()\-\/\\]/g, '').replace(/\s+/g, ' ');

            // Support multiple accepted answers separated by |
            if (typeof correctAnswer === 'string' && correctAnswer.includes('|')) {
                return correctAnswer.split('|').some(a => normalize(a) === normalize(studentAnswer));
            }

            // Support array of accepted answers
            if (Array.isArray(correctAnswer)) {
                return correctAnswer.some(a => normalize(a) === normalize(studentAnswer));
            }

            return normalize(studentAnswer) === normalize(correctAnswer);
        }

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = String(str);
            return div.innerHTML;
        }

        function tryParseJSON(str) {
            if (!str) return null;
            try { return JSON.parse(str); } catch { return null; }
        }

        async function fetchJSON(url) {
            const res = await fetch(url);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const text = await res.text();
            try { return JSON.parse(text); } catch { throw new Error('Invalid JSON response'); }
        }
    </script>
