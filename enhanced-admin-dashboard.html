                                    <li>Lexical Resource</li>
                                    <li>Grammatical Range & Accuracy</li>
                                </ul>
                            </div>
                            <div>
                                <strong>Task 2 (Essay):</strong>
                                <ul style="margin: 5px 0 0 20px; font-size: 0.9em;">
                                    <li>Task Response</li>
                                    <li>Coherence & Cohesion</li>
                                    <li>Lexical Resource</li>
                                    <li>Grammatical Range & Accuracy</li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        async function saveScore(submissionId) {
            const finalScore = document.getElementById('finalScore').value;
            const bandScore = document.getElementById('bandScore').value;

            if (!finalScore || finalScore < 0 || finalScore > 40) {
                alert('Please enter a valid score between 0 and 40');
                return;
            }

            try {
                // Update score in database (you might need to add this endpoint to your server)
                const response = await fetch(`${API_BASE}/update-score`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        submissionId: submissionId,
                        score: parseInt(finalScore),
                        bandScore: bandScore
                    })
                });

                if (response.ok) {
                    alert('Score saved successfully!');
                    closeModal();
                    loadSubmissions(); // Refresh the data
                } else {
                    alert('Failed to save score. Please try again.');
                }
            } catch (error) {
                console.error('Error saving score:', error);
                alert('Error saving score. Please try again.');
            }
        }

        async function saveWritingScore(submissionId) {
            const bandScore = document.getElementById('writingBandScore').value;

            if (!bandScore || isNaN(parseFloat(bandScore)) || parseFloat(bandScore) < 0 || parseFloat(bandScore) > 9) {
                alert('Please enter a valid band score between 0 and 9 (e.g., 6.5)');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/update-score`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        submissionId: submissionId,
                        score: null, // Writing tests don't have numerical scores
                        bandScore: bandScore
                    })
                });

                if (response.ok) {
                    alert('Band score saved successfully!');
                    closeModal();
                    loadSubmissions(); // Refresh the data
                } else {
                    alert('Failed to save band score. Please try again.');
                }
            } catch (error) {
                console.error('Error saving band score:', error);
                alert('Error saving band score. Please try again.');
            }
        }

        function closeModal() {
            document.getElementById('answerModal').style.display = 'none';
        }

        function exportData() {
            const csvContent = generateCSV(filteredSubmissions);
            const blob = new Blob([csvContent], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `test_submissions_${new Date().toISOString().split('T')[0]}.csv`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);
        }

        function generateCSV(submissions) {
            const headers = ['Student ID', 'Student Name', 'Mock Number', 'Skill', 'Score', 'Band Score', 'Start Time', 'End Time', 'Created At'];
            const rows = submissions.map(s => [
                s.student_id,
                s.student_name,
                s.mock_number,
                s.skill,
                s.score || '',
                s.band_score || '',
                s.start_time || '',
                s.end_time || '',
                s.created_at
            ]);

            return [headers, ...rows].map(row =>
                row.map(field => `"${field}"`).join(',')
            ).join('\n');
        }

        function logout() {
            localStorage.removeItem('adminToken');
            authToken = null;
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('adminContent').style.display = 'none';
            document.getElementById('logoutBtn').style.display = 'none';
            document.getElementById('username').value = 'admin';
            document.getElementById('password').value = 'admin123';
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('answerModal');
            if (event.target === modal) {
                closeModal();
            }
        }

        // Answer Management Functions
        let currentAnswerData = {};

        function initializeAnswerGrid() {
            const grid = document.getElementById('answerGrid');
            grid.innerHTML = '';
            
            for (let i = 1; i <= 40; i++) {
                const inputGroup = document.createElement('div');
                inputGroup.className = 'answer-input-group';
                inputGroup.innerHTML = `
                    <label>Q${i}:</label>
                    <input type="text" id="answer_${i}" placeholder="Enter answer ${i}" />
                `;
                grid.appendChild(inputGroup);
            }
            
            updateAnswerStatus('Ready to input answers');
        }

        async function loadAnswerSet() {
            const mockNum = document.getElementById('answerMockSelect').value;
            const skill = document.getElementById('answerSkillSelect').value;
            
            // Clear current inputs
            for (let i = 1; i <= 40; i++) {
                const input = document.getElementById(`answer_${i}`);
                if (input) input.value = '';
            }
            
            try {
                updateAnswerStatus('⏳ Loading answers from database...');
                
                // Load from database API
                const response = await fetch(`${API_BASE}/mock-answers?mock=${mockNum}&skill=${skill}`);
                const data = await response.json();
                
                if (data.success && data.answers) {
                    // Fill the input fields
                    for (let i = 1; i <= 40; i++) {
                        const input = document.getElementById(`answer_${i}`);
                        const answerKey = skill === 'listening' ? `q${i}` : `${i}`;
                        
                        if (input && data.answers[answerKey]) {
                            // Handle both array and string answers
                            const answerValue = Array.isArray(data.answers[answerKey]) ? 
                                data.answers[answerKey].join(', ') : data.answers[answerKey];
                            input.value = answerValue;
                        }
                    }
                    
                    // Update global correctAnswers object
                    if (!correctAnswers[`mock${mockNum}`]) {
                        correctAnswers[`mock${mockNum}`] = {};
                    }
                    correctAnswers[`mock${mockNum}`][skill] = data.answers;
                    
                    updateAnswerStatus(`✅ Loaded ${data.count}/40 answers for Mock ${mockNum} - ${skill.toUpperCase()}`);
                } else {
                    updateAnswerStatus(`📝 No saved answers found for Mock ${mockNum} - ${skill.toUpperCase()}`);
                }
            } catch (error) {
                console.error('Error loading answers:', error);
                updateAnswerStatus(`❌ Error loading answers: ${error.message}`);
                
                // Fallback to localStorage
                try {
                    const key = `answers_mock${mockNum}_${skill}`;
                    const savedAnswers = localStorage.getItem(key);
                    if (savedAnswers) {
                        const answers = JSON.parse(savedAnswers);
                        for (let i = 1; i <= 40; i++) {
                            const input = document.getElementById(`answer_${i}`);
                            const answerKey = skill === 'listening' ? `q${i}` : `${i}`;
                            if (input && answers[answerKey]) {
                                const answerValue = Array.isArray(answers[answerKey]) ? 
                                    answers[answerKey].join(', ') : answers[answerKey];
                                input.value = answerValue;
                            }
                        }
                        updateAnswerStatus(`� Loaded answers from local storage for Mock ${mockNum} - ${skill.toUpperCase()}`);
                    }
                } catch (fallbackError) {
                    console.error('Fallback to localStorage also failed:', fallbackError);
                }
            }
        }

        async function saveAnswerSet() {
            const mockNum = document.getElementById('answerMockSelect').value;
            const skill = document.getElementById('answerSkillSelect').value;
            
            const answers = {};
            let filledCount = 0;
            
            for (let i = 1; i <= 40; i++) {
                const input = document.getElementById(`answer_${i}`);
                if (input && input.value.trim()) {
                    const answerKey = skill === 'listening' ? `q${i}` : `${i}`;
                    let answerValue = input.value.trim();
                    
                    // For listening, wrap single answers in array for consistency
                    if (skill === 'listening' && !answerValue.includes(',')) {
                        // Check if it's a multiple choice (single letter) or text answer
                        if (answerValue.length === 1 && /[A-J]/i.test(answerValue)) {
                            answers[answerKey] = answerValue.toUpperCase();
                        } else {
                            answers[answerKey] = [answerValue.toLowerCase()];
                        }
                    } else if (skill === 'listening' && answerValue.includes(',')) {
                        // Multiple acceptable answers
                        answers[answerKey] = answerValue.split(',').map(a => a.trim().toLowerCase());
                    } else {
                        answers[answerKey] = answerValue;
                    }
                    filledCount++;
                }
            }
            
            if (filledCount === 0) {
                updateAnswerStatus('❌ No answers to save');
                return;
            }
            
            try {
                updateAnswerStatus('⏳ Saving answers to database...');
                
                // Save to database API
                const response = await fetch(`${API_BASE}/mock-answers`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        mock: mockNum,
                        skill: skill,
                        answers: answers
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // Update the global correctAnswers object
                    if (!correctAnswers[`mock${mockNum}`]) {
                        correctAnswers[`mock${mockNum}`] = {};
                    }
                    correctAnswers[`mock${mockNum}`][skill] = answers;
                    
                    // Also save to localStorage as backup
                    const key = `answers_mock${mockNum}_${skill}`;
                    localStorage.setItem(key, JSON.stringify(answers));
                    
                    updateAnswerStatus(`✅ ${data.message}`);
                } else {
                    updateAnswerStatus(`❌ Failed to save: ${data.message}`);
                }
                
            } catch (error) {
                console.error('Error saving answers:', error);
                updateAnswerStatus(`❌ Error saving answers: ${error.message}`);
                
                // Fallback to localStorage
                try {
                    const key = `answers_mock${mockNum}_${skill}`;
                    localStorage.setItem(key, JSON.stringify(answers));
                    
                    if (!correctAnswers[`mock${mockNum}`]) {
                        correctAnswers[`mock${mockNum}`] = {};
                    }
                    correctAnswers[`mock${mockNum}`][skill] = answers;
                    
                    updateAnswerStatus(`📋 Saved ${filledCount}/40 answers locally for Mock ${mockNum} - ${skill.toUpperCase()}`);
                } catch (fallbackError) {
                    console.error('Fallback to localStorage also failed:', fallbackError);
                    updateAnswerStatus(`❌ Failed to save answers both online and locally`);
                }
            }
        }

        async function clearAnswerSet() {
            if (confirm('Are you sure you want to clear all answers? This action will delete them from the database and cannot be undone.')) {
                const mockNum = document.getElementById('answerMockSelect').value;
                const skill = document.getElementById('answerSkillSelect').value;
                
                try {
                    updateAnswerStatus('⏳ Clearing answers from database...');
                    
                    // Clear from database
                    const response = await fetch(`${API_BASE}/mock-answers?mock=${mockNum}&skill=${skill}`, {
                        method: 'DELETE'
                    });
                    
                    const data = await response.json();
                    
                    if (data.success) {
                        // Clear input fields
                        for (let i = 1; i <= 40; i++) {
                            const input = document.getElementById(`answer_${i}`);
                            if (input) input.value = '';
                        }
                        
                        // Clear from global correctAnswers
                        if (correctAnswers[`mock${mockNum}`] && correctAnswers[`mock${mockNum}`][skill]) {
                            delete correctAnswers[`mock${mockNum}`][skill];
                        }
                        
                        // Clear from localStorage backup
                        const key = `answers_mock${mockNum}_${skill}`;
                        localStorage.removeItem(key);
                        
                        updateAnswerStatus(`✅ ${data.message}`);
                    } else {
                        updateAnswerStatus(`❌ Failed to clear: ${data.message}`);
                    }
                    
                } catch (error) {
                    console.error('Error clearing answers:', error);
                    updateAnswerStatus(`❌ Error clearing answers: ${error.message}`);
                    
                    // Still clear the local fields
                    for (let i = 1; i <= 40; i++) {
                        const input = document.getElementById(`answer_${i}`);
                        if (input) input.value = '';
                    }
                    updateAnswerStatus('🗑️ Cleared local fields (database may still contain data)');
                }
            }
        }

        function updateAnswerStatus(message) {
            const status = document.getElementById('answerStatus');
            if (status) {
                status.textContent = message;
                status.style.color = message.includes('✅') ? '#28a745' : 
                                   message.includes('❌') ? '#dc3545' : '#007bff';
            }
        }

        // Initialize answer management when admin panel loads
        function initializeAnswerManagement() {
            initializeAnswerGrid();
            
            // Add event listeners for dropdown changes
            document.getElementById('answerMockSelect').addEventListener('change', loadAnswerSet);
            document.getElementById('answerSkillSelect').addEventListener('change', loadAnswerSet);
            
            loadAnswerSet(); // Load default (Mock 1, Reading)
        }

        // Toggle Answer Management Section
        function toggleAnswerManagement() {
            const header = document.querySelector('.answer-management-header');
            const content = document.getElementById('answerManagementContent');
            
            if (content.classList.contains('open')) {
                content.classList.remove('open');
                header.classList.remove('open');
            } else {
                content.classList.add('open');
                header.classList.add('open');
            }
        }

        // Auto-refresh every 60 seconds
        setInterval(() => {
            if (authToken && document.getElementById('adminContent').style.display !== 'none') {
                loadSubmissions();
            }
        }, 60000);
    </script>
